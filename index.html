<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
<title>Radar Meteorológico · DroneWeather</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;width:100%;font-family:'Space Grotesk',system-ui,sans-serif;background:#080F1A}
  #map{position:absolute;inset:0;width:100%;height:100%;z-index:1}

  /* ── Barra de busca (flutuante, à direita) ── */
  .topbar{position:absolute;top:10px;right:12px;left:auto;z-index:1000;padding:0;
    width:34%;max-width:440px;min-width:280px;background:none;pointer-events:none}
  .topbar .inner{display:flex;gap:6px;align-items:center;pointer-events:auto}
  .search-wrap{flex:1;position:relative;min-width:0}
  .search{display:flex;align-items:center;gap:6px;background:rgba(13,19,34,.95);
    border:1px solid #2A3A5C;border-radius:10px;padding:7px 11px;min-width:0;
    box-shadow:0 4px 16px rgba(0,0,0,.5)}
  .search input{flex:1;background:transparent;border:none;color:#E8ECF4;
    font-family:inherit;font-size:12px;outline:none;min-width:0}
  .suggest{position:absolute;top:calc(100% + 4px);left:0;right:0;z-index:1003;
    background:#0D1322;border:1px solid #2A3A5C;border-radius:10px;overflow:hidden;
    display:none;box-shadow:0 8px 28px rgba(0,0,0,.6)}
  .suggest.open{display:block}
  .suggest-item{padding:9px 12px;font-size:12px;color:#CBD5E1;cursor:pointer;
    border-bottom:1px solid #151E30;line-height:1.3}
  .suggest-item:last-child{border-bottom:none}
  .suggest-item:hover,.suggest-item.active{background:#1E3A5F;color:#fff}
  .suggest-item .sub{display:block;font-size:10px;color:#5B6B86;margin-top:1px}
  .btn{border:none;border-radius:9px;background:#3B82F6;color:#fff;font-family:inherit;
    font-size:12px;font-weight:600;padding:8px 11px;cursor:pointer;white-space:nowrap;flex-shrink:0;
    box-shadow:0 4px 16px rgba(0,0,0,.5)}
  .btn.ghost{background:rgba(13,19,34,.95);border:1px solid #2A3A5C;color:#94A3B8;font-size:14px;padding:8px 8px}
  .btn.ghost:hover{color:#E8ECF4}

  /* ── Painel de camadas ── */
  .controls{position:absolute;top:12px;left:12px;z-index:1000;
    background:rgba(13,19,34,.95);border:1px solid #1A2336;border-radius:11px;
    padding:10px 12px;min-width:170px;backdrop-filter:blur(6px)}
  .lbl{font-size:8px;color:#5B6B86;text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px}
  .layer-toggle{display:flex;align-items:center;gap:7px;margin-top:5px;
    cursor:pointer;font-size:11px;color:#CBD5E1;user-select:none;line-height:1.2}
  .layer-toggle input{accent-color:#3B82F6;width:14px;height:14px;flex-shrink:0;margin:0}
  .opacity-row{margin-top:9px}
  .opacity-row input{width:100%;accent-color:#3B82F6;margin-top:3px}
  .sep{height:1px;background:#1A2336;margin:9px -12px}
  .map-btns{display:flex;gap:4px;margin-top:5px}
  .map-btn{flex:1;background:#111827;border:1px solid #1A2336;color:#64748B;
    font-size:8.5px;font-family:inherit;border-radius:6px;padding:5px 2px;cursor:pointer;line-height:1.25}
  .map-btn.active{background:#1E3A5F;color:#60A5FA;border-color:#3B82F6}

  /* ── Linha do tempo (animação) ── */
  .timeline{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);z-index:1000;
    background:rgba(13,19,34,.96);border:1px solid #2A3A5C;border-radius:13px;
    padding:11px 16px;width:min(620px,92%);box-shadow:0 8px 28px rgba(0,0,0,.6);
    backdrop-filter:blur(6px)}
  .timeline-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
  .tl-time{font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:700;color:#E8ECF4}
  .tl-time .rel{font-size:10px;color:#5B6B86;font-weight:400;margin-left:7px}
  .tl-play{border:none;background:#3B82F6;color:#fff;width:34px;height:34px;border-radius:9px;
    cursor:pointer;font-size:15px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
  .tl-play:hover{background:#2563EB}
  .tl-slider{width:100%;accent-color:#3B82F6}
  .tl-marks{display:flex;justify-content:space-between;font-size:9px;color:#5B6B86;margin-top:3px}

  /* ── Legenda de precipitação ── */
  .precip-legend{position:absolute;bottom:14px;right:12px;z-index:1000;
    background:rgba(13,19,34,.95);border:1px solid #1A2336;border-radius:11px;
    padding:9px 11px;font-size:9px;color:#94A3B8;backdrop-filter:blur(6px)}
  .precip-legend .bar{width:14px;height:90px;border-radius:4px;margin:5px auto 4px;
    background:linear-gradient(to top,#88ABDB,#5A7BC4,#7B5AB0,#C44A8F,#E8516B,#F5A623,#FFE14D)}
  .precip-legend .ends{display:flex;flex-direction:column;justify-content:space-between;
    height:90px;float:right;margin-left:4px;font-size:8px}

  /* ── Alerta de status ── */
  .alert{position:absolute;top:14px;left:50%;transform:translateX(-50%);z-index:1000;
    border-radius:12px;padding:9px 16px;font-size:12px;font-weight:600;text-align:center;
    box-shadow:0 6px 28px rgba(0,0,0,.6);max-width:55%;transition:.2s;
    background:#1E3A5F;color:#93C5FD;border:1px solid #3B82F655;pointer-events:none}
  .alert.hide{opacity:0;pointer-events:none}
  @media (max-width:640px){
    .alert{top:12px;left:12px;right:auto;transform:none;max-width:60%;font-size:11px;text-align:left}
    .controls{top:auto;bottom:120px;left:12px}
    .precip-legend{bottom:120px}
  }

  /* Leaflet overrides */
  .leaflet-container{background:#0A0E1A}
  .leaflet-popup-content-wrapper{background:#0D1322;color:#E8ECF4;border-radius:10px}
  .leaflet-popup-tip{background:#0D1322}
  .leaflet-bar a{background:#0D1322;color:#E8ECF4;border-color:#1A2336}
  .leaflet-bar a:hover{background:#1A2336}
</style>
</head>
<body>
  <div id="map"></div>

  <!-- Busca -->
  <div class="topbar">
    <div class="inner">
      <div class="search-wrap">
        <div class="search">
          <span style="opacity:.45;flex-shrink:0;font-size:13px">🔍</span>
          <input id="q" type="text" autocomplete="off" placeholder="Cidade ou coordenadas"/>
        </div>
        <div class="suggest" id="suggest"></div>
      </div>
      <button class="btn" id="goBtn">Ir</button>
      <button class="btn ghost" id="gpsBtn" title="Localização GPS">📍</button>
    </div>
  </div>

  <!-- Painel de camadas -->
  <div class="controls">
    <div class="lbl">Camadas</div>
    <label class="layer-toggle"><input type="checkbox" id="tgPrecip" checked/>🌧️ Precipitação (radar)</label>
    <label class="layer-toggle"><input type="checkbox" id="tgClouds"/>☁️ Nuvens</label>
    <label class="layer-toggle"><input type="checkbox" id="tgTemp"/>🌡️ Temperatura</label>
    <label class="layer-toggle"><input type="checkbox" id="tgLocal" checked/>📍 Seu local</label>
    <div class="opacity-row">
      <div class="lbl">Opacidade da chuva</div>
      <input type="range" id="opacity" min="0" max="100" value="80"/>
    </div>
    <div class="sep"></div>
    <div class="lbl">Mapa de fundo</div>
    <div class="map-btns">
      <button class="map-btn active" id="btnOsm">🗺<br>Mapa</button>
      <button class="map-btn" id="btnSat">🛰<br>Satélite</button>
      <button class="map-btn" id="btnDark">🌑<br>Escuro</button>
    </div>
  </div>

  <!-- Legenda de precipitação -->
  <div class="precip-legend">
    Precip
    <div class="ends"><span>Forte</span><span>Fraca</span></div>
    <div class="bar"></div>
  </div>

  <!-- Linha do tempo -->
  <div class="timeline">
    <div class="timeline-top">
      <button class="tl-play" id="playBtn" title="Reproduzir">▶</button>
      <div class="tl-time"><span id="tlTime">—</span><span class="rel" id="tlRel"></span></div>
    </div>
    <input type="range" class="tl-slider" id="tlSlider" min="0" max="0" value="0"/>
    <div class="tl-marks"><span>-2h</span><span>agora</span></div>
  </div>

  <!-- Alerta -->
  <div class="alert" id="alert">Carregando radar de precipitação…</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ── Estado e configuração ──────────────────────────────────────────
let userLat=-22.1209, userLon=-51.3886;   // Presidente Prudente (fallback)
const RV_API = 'https://api.rainviewer.com/public/weather-maps.json';

// CHAVE OpenWeatherMap — cole a sua aqui (gratuita em openweathermap.org).
// A chave demora ~2h para ativar após criada.
const OWM_KEY = d6d4bd3fc7921e759bcc5b6634dca6c5;

// ── Mapa base ──────────────────────────────────────────────────────
const map = L.map('map',{zoomControl:true,attributionControl:true}).setView([userLat,userLon],7);

const tiles = {
  osm: L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:'© OpenStreetMap'}),
  sat: L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',{maxZoom:19,attribution:'© Esri'}),
  dark: L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{maxZoom:19,attribution:'© CARTO'}),
};
let curTile='osm';
tiles.osm.addTo(map);

// Marcador do usuário
let userMarker = L.circleMarker([userLat,userLon],{radius:7,color:'#fff',weight:2,fillColor:'#3B82F6',fillOpacity:1}).addTo(map);

// ── Camadas OpenWeatherMap (nuvens, temperatura) ───────────────────
const owmTem = !OWM_KEY || OWM_KEY==='COLE_SUA_CHAVE_AQUI' ? false : true;
const owmLayers = {
  clouds: owmTem ? L.tileLayer(`https://tile.openweathermap.org/map/clouds_new/{z}/{x}/{y}.png?appid=${OWM_KEY}`,{opacity:0.7,zIndex:4,maxZoom:18}) : null,
  temp:   owmTem ? L.tileLayer(`https://tile.openweathermap.org/map/temp_new/{z}/{x}/{y}.png?appid=${OWM_KEY}`,{opacity:0.6,zIndex:3,maxZoom:18}) : null,
};

// ── Radar de precipitação (RainViewer) ─────────────────────────────
let radarFrames=[];      // lista de {time, path}
let radarLayers={};      // cache de camadas por índice
let frameIdx=0;          // frame atual
let radarOpacity=0.8;
let playing=false, playTimer=null;
const RV_TILE_HOST='https://tilecache.rainviewer.com';
const RV_SIZE=256, RV_COLOR=2, RV_SMOOTH=1, RV_SNOW=1; // color 2 = Universal Blue

function urlDoFrame(f){
  // RainViewer: {host}{path}/{size}/{z}/{x}/{y}/{color}/{smooth}_{snow}.png
  return `${f.host}${f.path}/${RV_SIZE}/{z}/{x}/{y}/${RV_COLOR}/${RV_SMOOTH}_${RV_SNOW}.png`;
}

function camadaDoFrame(i){
  if(radarLayers[i]) return radarLayers[i];
  const f=radarFrames[i];
  const layer=L.tileLayer(urlDoFrame(f),{opacity:0,zIndex:5,maxZoom:18,tileSize:256});
  radarLayers[i]=layer;
  layer.addTo(map);
  return layer;
}

function mostrarFrame(i){
  if(!radarFrames.length) return;
  i=Math.max(0,Math.min(i,radarFrames.length-1));
  const novaCamada=camadaDoFrame(i);
  // Esconde as outras, mostra a atual (com o toggle de precip respeitado)
  const mostrar=document.getElementById('tgPrecip').checked;
  Object.keys(radarLayers).forEach(k=>{
    radarLayers[k].setOpacity(parseInt(k)===i && mostrar ? radarOpacity : 0);
  });
  frameIdx=i;
  document.getElementById('tlSlider').value=i;
  atualizarRelogio(i);
}

function atualizarRelogio(i){
  const f=radarFrames[i]; if(!f) return;
  const d=new Date(f.time*1000);
  const hh=String(d.getHours()).padStart(2,'0');
  const mm=String(d.getMinutes()).padStart(2,'0');
  document.getElementById('tlTime').textContent=`${hh}:${mm}`;
  const agora=radarFrames[radarFrames.length-1];
  const difMin=Math.round((f.time-agora.time)/60);
  const rel = difMin===0 ? 'agora' : (difMin<0 ? `${difMin} min` : `+${difMin} min`);
  document.getElementById('tlRel').textContent=rel;
}

async function carregarRadar(){
  try{
    const r=await fetch(RV_API);
    const j=await r.json();
    const host=j.host||'';
    const past=(j.radar&&j.radar.past)||[];
    const nowcast=(j.radar&&j.radar.nowcast)||[];
    radarFrames=past.concat(nowcast).map(f=>({time:f.time,path:f.path,host}));
    if(!radarFrames.length){ setAlert('Sem dados de radar no momento.'); return; }
    const sl=document.getElementById('tlSlider');
    sl.max=radarFrames.length-1;
    sl.value=radarFrames.length-1;
    mostrarFrame(radarFrames.length-1);  // frame mais recente
    document.getElementById('alert').classList.add('hide');
  }catch(e){
    setAlert('Erro ao carregar radar de precipitação.');
  }
}

// ── Animação play/pause ────────────────────────────────────────────
function togglePlay(){
  playing=!playing;
  document.getElementById('playBtn').textContent=playing?'⏸':'▶';
  if(playing){
    playTimer=setInterval(()=>{
      let prox=frameIdx+1;
      if(prox>=radarFrames.length) prox=0;
      mostrarFrame(prox);
    },700);
  }else{
    clearInterval(playTimer); playTimer=null;
  }
}

// ── Helpers ────────────────────────────────────────────────────────
function setAlert(msg){
  const el=document.getElementById('alert');
  if(!msg){ el.classList.add('hide'); return; }
  el.textContent=msg; el.classList.remove('hide');
}
function recenter(z){
  map.setView([userLat,userLon], z||map.getZoom());
  userMarker.setLatLng([userLat,userLon]);
}

// ── Busca (Nominatim) com autocomplete e dedupe ────────────────────
const suggestEl=document.getElementById('suggest');
let suggestItems=[], suggestIdx=-1, suggestTimer=null;

async function buscarSugestoes(q){
  try{
    const r=await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=6&accept-language=pt-BR&countrycodes=br`);
    return await r.json();
  }catch(e){ return []; }
}
function renderSugestoes(lista){
  const vistos=new Set(); const unica=[];
  for(const it of (lista||[])){
    const nome=it.display_name.split(',')[0].trim().toLowerCase();
    const regiao=it.display_name.split(',').slice(1,3).join(',').trim().toLowerCase();
    const cN=`${nome}|${regiao}`, cC=`${parseFloat(it.lat).toFixed(2)},${parseFloat(it.lon).toFixed(2)}`;
    if(vistos.has(cN)||vistos.has(cC)) continue;
    vistos.add(cN); vistos.add(cC); unica.push(it);
  }
  suggestItems=unica; suggestIdx=-1;
  if(!unica.length){ suggestEl.classList.remove('open'); suggestEl.innerHTML=''; return; }
  suggestEl.innerHTML=unica.map((it,i)=>{
    const nome=it.display_name.split(',')[0];
    const resto=it.display_name.split(',').slice(1,4).join(',').trim();
    return `<div class="suggest-item" data-i="${i}">${nome}<span class="sub">${resto}</span></div>`;
  }).join('');
  suggestEl.classList.add('open');
  suggestEl.querySelectorAll('.suggest-item').forEach(el=>{
    el.addEventListener('click',()=>escolherSugestao(parseInt(el.dataset.i)));
  });
}
function escolherSugestao(i){
  const it=suggestItems[i]; if(!it) return;
  userLat=parseFloat(it.lat); userLon=parseFloat(it.lon);
  document.getElementById('q').value=it.display_name.split(',')[0];
  suggestEl.classList.remove('open');
  recenter(9);
}
function parseCoords(q){
  const m=q.trim().replace(',',' ').split(/\s+/);
  if(m.length>=2){
    const lat=parseFloat(m[0]), lon=parseFloat(m[1]);
    if(Number.isFinite(lat)&&Number.isFinite(lon)&&Math.abs(lat)<=90&&Math.abs(lon)<=180) return{lat,lon};
  }
  return null;
}
async function executarBusca(){
  const q=document.getElementById('q').value.trim();
  if(!q) return;
  const c=parseCoords(q);
  if(c){ userLat=c.lat; userLon=c.lon; recenter(10); suggestEl.classList.remove('open'); return; }
  const lista=await buscarSugestoes(q);
  if(lista&&lista.length) escolherSugestao(0);
}

document.getElementById('q').addEventListener('input',e=>{
  const q=e.target.value.trim();
  clearTimeout(suggestTimer);
  if(q.length<3){ suggestEl.classList.remove('open'); return; }
  suggestTimer=setTimeout(async()=>{ renderSugestoes(await buscarSugestoes(q)); },300);
});
document.getElementById('q').addEventListener('keydown',e=>{
  if(e.key==='Enter'){ e.preventDefault(); if(suggestIdx>=0) escolherSugestao(suggestIdx); else executarBusca(); }
  else if(e.key==='Escape'){ suggestEl.classList.remove('open'); }
});
document.getElementById('goBtn').addEventListener('click',executarBusca);
document.getElementById('gpsBtn').addEventListener('click',()=>{
  if(navigator.geolocation) navigator.geolocation.getCurrentPosition(
    p=>{userLat=p.coords.latitude;userLon=p.coords.longitude;recenter(9);},
    ()=>setAlert('GPS indisponível.'),{timeout:8000});
});

// ── Toggles ────────────────────────────────────────────────────────
document.getElementById('tgPrecip').addEventListener('change',()=>mostrarFrame(frameIdx));
document.getElementById('tgClouds').addEventListener('change',e=>{
  if(!owmLayers.clouds){ alert('Configure a chave do OpenWeatherMap no código para usar esta camada.'); e.target.checked=false; return; }
  if(e.target.checked) owmLayers.clouds.addTo(map); else map.removeLayer(owmLayers.clouds);
});
document.getElementById('tgTemp').addEventListener('change',e=>{
  if(!owmLayers.temp){ alert('Configure a chave do OpenWeatherMap no código para usar esta camada.'); e.target.checked=false; return; }
  if(e.target.checked) owmLayers.temp.addTo(map); else map.removeLayer(owmLayers.temp);
});
document.getElementById('tgLocal').addEventListener('change',e=>{
  if(e.target.checked) userMarker.addTo(map); else map.removeLayer(userMarker);
});
document.getElementById('opacity').addEventListener('input',e=>{
  radarOpacity=parseInt(e.target.value)/100;
  mostrarFrame(frameIdx);
});
document.getElementById('tlSlider').addEventListener('input',e=>{
  if(playing) togglePlay();
  mostrarFrame(parseInt(e.target.value));
});
document.getElementById('playBtn').addEventListener('click',togglePlay);

// Troca de mapa de fundo
['Osm','Sat','Dark'].forEach(k=>{
  document.getElementById('btn'+k).addEventListener('click',()=>{
    if(curTile===k.toLowerCase()) return;
    map.removeLayer(tiles[curTile]);
    curTile=k.toLowerCase();
    tiles[curTile].addTo(map);
    // Reposiciona o radar acima do novo fundo
    Object.values(radarLayers).forEach(l=>{ map.removeLayer(l); l.addTo(map); });
    mostrarFrame(frameIdx);
    document.querySelectorAll('.map-btn').forEach(b=>b.classList.remove('active'));
    document.getElementById('btn'+k).classList.add('active');
  });
});

// ── Integração com o shell (DroneWeather) ──────────────────────────
const _params=new URLSearchParams(location.search);
const _qlat=parseFloat(_params.get('lat')), _qlon=parseFloat(_params.get('lon'));
if(Number.isFinite(_qlat)&&Number.isFinite(_qlon)){
  userLat=_qlat; userLon=_qlon; recenter(8);
}else if(navigator.geolocation){
  navigator.geolocation.getCurrentPosition(
    p=>{userLat=p.coords.latitude;userLon=p.coords.longitude;recenter(8);},
    ()=>{},{timeout:8000});
}
window.addEventListener('message',ev=>{
  const d=ev.data;
  if(d&&d.tipo==='setLocal'&&Number.isFinite(d.lat)&&Number.isFinite(d.lon)){
    userLat=d.lat; userLon=d.lon; recenter(8);
    setTimeout(()=>map.invalidateSize(),100);
  }
});

// ── Init ───────────────────────────────────────────────────────────
carregarRadar();
// Atualiza os frames a cada 5 min (RainViewer atualiza nesse intervalo)
setInterval(()=>{ radarLayers={}; carregarRadar(); }, 5*60*1000);

// Garante que o Leaflet recalcule o tamanho do mapa após o iframe ter dimensões
// (sem isso, dentro de um iframe o mapa pode renderizar em branco/altura zero).
function ajustarMapa(){ map.invalidateSize(); }
setTimeout(ajustarMapa, 200);
setTimeout(ajustarMapa, 800);
window.addEventListener('resize', ajustarMapa);
window.addEventListener('load', ajustarMapa);
</script>
</body>
</html>
