<script type="text/babel">

// ════════════════════════════════════════════════════════════════════════════

// ════════════════════════════════════════════════════════════════════════════

// ── Utilitários ────────────────────────────────────────────────────────────────
const Z2 = (n) => String(Math.floor(Math.abs(n))).padStart(2,"0");
const toHM = (m) => `${Z2(m/60)}:${Z2(m%60)}`;
const toMins = (d) => (d ? d.getHours()*60 + d.getMinutes() : 0);
const parseLocal = (iso) => {
  const [dt,tm] = iso.split("T");
  const [y,mo,d] = dt.split("-");
  const [h,mi] = tm.split(":");
  return new Date(+y,+mo-1,+d,+h,+mi);
};
const compass = (deg) =>
  ["N","NE","L","SE","S","SO","O","NO"][Math.round(deg/45)%8];

// ── Posição solar astronômica (algoritmo NOAA) — offline ─────────────────────
// Retorna azimute (0=N, horário), altitude e declinação em graus.
function solarPosition(date, lat, lon){
  const rad=Math.PI/180, deg=180/Math.PI;
  const jd=(date.getTime()/86400000)+2440587.5;
  const n=jd-2451545.0;
  let L=(280.460+0.9856474*n)%360; if(L<0)L+=360;
  let g=((357.528+0.9856003*n)%360)*rad;
  const lambda=(L+1.915*Math.sin(g)+0.020*Math.sin(2*g))*rad;
  const eps=(23.439-0.0000004*n)*rad;
  const delta=Math.asin(Math.sin(eps)*Math.sin(lambda));
  const alpha=Math.atan2(Math.cos(eps)*Math.sin(lambda),Math.cos(lambda));
  const gmst=(280.46061837+360.98564736629*n)%360;
  const lst=((gmst+lon)%360)*rad;
  let H=lst-alpha;
  while(H<-Math.PI)H+=2*Math.PI; while(H>Math.PI)H-=2*Math.PI;
  const latR=lat*rad;
  const alt=Math.asin(Math.sin(latR)*Math.sin(delta)+Math.cos(latR)*Math.cos(delta)*Math.cos(H));
  let az=Math.atan2(-Math.sin(H),Math.tan(delta)*Math.cos(latR)-Math.sin(latR)*Math.cos(H));
  az=(az*deg+360)%360;
  return {azimuth:az, altitude:alt*deg, declination:delta*deg};
}
// azimute/altitude → vetor 3D no domo (raio R). +Z=Norte, +X=Leste, +Y=cima.
function sunVec3D(THREE, azDeg, altDeg, R){
  const az=azDeg*Math.PI/180, alt=Math.max(altDeg,-8)*Math.PI/180;
  return new THREE.Vector3(
    Math.sin(az)*Math.cos(alt)*R,
    Math.sin(alt)*R,
    Math.cos(az)*Math.cos(alt)*R
  );
}
// Constrói o instante UTC correto p/ um "minuto do dia LOCAL" no fuso do alvo.
// Corrige o bug de usar o fuso do navegador ao planejar para outra cidade.
function localMinToDate(y, m, d, minutes, utcOffsetSec){
  return new Date(Date.UTC(y, m-1, d) - utcOffsetSec*1000 + minutes*60000);
}
// Quebra uma sequência de pontos 3D quando o azimute "salta" (cruzamento do zênite),
// retornando segmentos contínuos para não desenhar linhas atravessando o domo.
function splitOnAzJump(samples){
  // samples: [{az, v}] — devolve array de arrays de vetores
  const segs = []; let cur = [];
  for (let i=0; i<samples.length; i++){
    if (i>0){
      let dAz = Math.abs(samples[i].az - samples[i-1].az);
      if (dAz > 180) dAz = 360 - dAz;
      if (dAz > 90){ if (cur.length) segs.push(cur); cur = []; }  // salto → novo segmento
    }
    cur.push(samples[i].v);
  }
  if (cur.length) segs.push(cur);
  return segs;
}

// Arco de declinação fixa (trajetória do sol num solstício/equinócio) p/ dada latitude
function declArcPts(THREE, declDeg, lat, R){
  const rad=Math.PI/180, deg=180/Math.PI, pts=[];
  const latR=lat*rad, dR=declDeg*rad;
  for(let Hd=-180; Hd<=180; Hd+=2){
    const H=Hd*rad;
    const alt=Math.asin(Math.sin(latR)*Math.sin(dR)+Math.cos(latR)*Math.cos(dR)*Math.cos(H));
    if(alt < -1*rad) continue;
    let az=Math.atan2(-Math.sin(H),Math.tan(dR)*Math.cos(latR)-Math.sin(latR)*Math.cos(H));
    az=(az*deg+360)%360;
    pts.push(sunVec3D(THREE, az, alt*deg, R));
  }
  return pts;
}

// ── Crepúsculo civil astronômico ─────────────────────────────────────────────
// Retorna quantos minutos o crepúsculo civil dura antes do nascer / após o pôr
function calcCivilTwilightOffset(date, lat) {
  const toRad = (d) => d * Math.PI / 180;
  const toDeg = (r) => r * 180 / Math.PI;
  // Declinação solar precisa (Fourier de baixa ordem, erro < 0.2°)
  const N = Math.floor((date - new Date(Date.UTC(date.getFullYear(),0,0))) / 86400000);
  const g = toRad((357.529 + 0.98560028 * N) % 360);
  const lam = toRad((280.459 + 0.98564736 * N + 1.915*Math.sin(g) + 0.020*Math.sin(2*g)) % 360);
  const dec = Math.asin(Math.sin(toRad(23.439)) * Math.sin(lam));
  const latR = toRad(lat);
  // Ângulo horário (em minutos de tempo) para uma dada elevação do sol
  const haMinutes = (elev) => {
    const cosH = (Math.sin(toRad(elev)) - Math.sin(latR) * Math.sin(dec))
                  / (Math.cos(latR) * Math.cos(dec));
    if (cosH < -1) return Infinity;  // sol nunca atinge essa elevação (verão polar)
    if (cosH > 1)  return null;       // sol nunca sobe tanto (inverno polar)
    return toDeg(Math.acos(cosH)) * 4; // 1° de rotação = 4 min
  };
  const H0 = haMinutes(-0.833); // borda superior do sol no horizonte (com refração)
  const Hc = haMinutes(-6);     // fim do crepúsculo civil (6° abaixo)
  if (H0 == null || Hc == null) return 30;          // noite/dia polar → fallback
  if (!isFinite(H0) || !isFinite(Hc)) return 40;    // crepúsculo prolongado
  // duração do crepúsculo civil = diferença dos ângulos horários
  return Math.max(12, Math.round(Hc - H0));
}

// ── Física: perfil logarítmico do vento ──────────────────────────────────────
// Usa medições em 10m e 80m para extrapolar qualquer altura via lei logarítmica
const windAtHeight = (v10, v80, h) => {
  if (v10 == null || v80 == null || v10 <= 0) return v10 ?? 0;
  const a = (v80 - v10) / (Math.log(80) - Math.log(10));
  const b = v10 - a * Math.log(10);
  return Math.max(0, a * Math.log(h) + b);
};
const gustAtHeight = (gust10, v10, vH) => {
  if (!gust10 || !v10 || v10 <= 0 || vH == null) return gust10 ?? 0;
  return Math.max(0, gust10 * (vH / v10));
};

// ── Classificações ─────────────────────────────────────────────────────────────
const CL = {
  good:{ color:"#22C55E", tag:"OK",      bg:"#14532D" },
  warn:{ color:"#F59E0B", tag:"ATENÇÃO", bg:"#92400E" },
  bad: { color:"#EF4444", tag:"RUIM",    bg:"#7F1D1D" },
};
const gradeWind   = (v) => v < 20 ? "good" : v < 35 ? "warn" : "bad";
const gradePrecip = (v) => v < 20 ? "good" : v < 50 ? "warn" : "bad";
const gradeVis    = (v) => v > 8  ? "good" : v > 3  ? "warn" : "bad";
const gradeCloud  = (v) => v < 60 ? "good" : "warn";
const gradeKp     = (v) => v==null||isNaN(v) ? "warn" : v < 4 ? "good" : v < 5 ? "warn" : "bad";
// Classificação do vento em m/s para operações RPA a 120m AGL
const gradeWindMs = (vMs) => vMs <= 10.0 ? "good" : vMs < 12.0 ? "warn" : "bad";
const WIND_COL = { good:"#22C55E", warn:"#F97316", bad:"#EF4444" };
const WIND_TAG = { good:"OK",      warn:"ATENÇÃO", bad:"RUIM"   };
const WIND_BG  = { good:"#14532D", warn:"#7C2D12", bad:"#7F1D1D"};

const worstOf     = (...gs) =>
  gs.includes("bad") ? "bad" : gs.includes("warn") ? "warn" : "good";

const BANNER = {
  good:{ icon:"✅", text:"Boas condições para voo",  bg:"#14532D" },
  warn:{ icon:"⚠️", text:"Condições moderadas",       bg:"#78350F" },
  bad: { icon:"🚫", text:"Condições desfavoráveis",  bg:"#7F1D1D" },
};

// ── Thumb arrastável ──────────────────────────────────────────────────────────
function Thumb({ pct, onDrag, minM=0, spanM=1440 }) {
  const cap = (e) => { e.preventDefault(); e.currentTarget.setPointerCapture(e.pointerId); };
  const drg = (e) => {
    if (!e.currentTarget.hasPointerCapture(e.pointerId)) return;
    const t = e.currentTarget.closest("[data-track]");
    if (!t) return;
    const { left, width } = t.getBoundingClientRect();
    const ratio = Math.max(0, Math.min(1, (e.clientX - left) / width));
    onDrag(Math.round((minM + ratio * spanM) / 5) * 5);
  };
  const rel = (e) => e.currentTarget.releasePointerCapture(e.pointerId);
  return (
    <div onPointerDown={cap} onPointerMove={drg} onPointerUp={rel} style={{
      position:"absolute", left:`${pct}%`, top:"50%",
      transform:"translate(-50%,-50%)", width:26, height:26,
      borderRadius:"50%", background:"white", border:"3px solid #3B82F6",
      boxShadow:"0 2px 8px rgba(0,0,0,.6)", cursor:"grab",
      touchAction:"none", zIndex:10, userSelect:"none",
    }}/>
  );
}

// ── Bússola SVG com orientação do dispositivo ─────────────────────────────────
function WindCompass({ windFromDeg, v120, deviceHeading, hasOrientation, onRequestPerm }) {
  const SIZE = 154, cx = 77, cy = 77, r = 62;
  const windToDeg = (windFromDeg + 180) % 360; // para onde o vento sopra

  // Converte grau meteorológico (0=N, horário) para coordenadas SVG no círculo
  const degToXY = (deg, radius) => {
    const rad = (deg - 90) * Math.PI / 180;
    return { x: cx + radius * Math.cos(rad), y: cy + radius * Math.sin(rad) };
  };

  const CARDINALS = [
    { deg:0,   label:"N", north:true  },
    { deg:90,  label:"L", north:false },
    { deg:180, label:"S", north:false },
    { deg:270, label:"O", north:false },
  ];

  // Seta: ponta aponta para onde o vento vai (windToDeg)
  const TIP  = degToXY(windToDeg, r * 0.74);
  const TAIL = degToXY(windToDeg + 180, r * 0.30);
  const perp = (windToDeg + 90) * Math.PI / 180 - Math.PI/2;
  const backPt = degToXY(windToDeg, r * 0.60);
  const hw = 5.5;
  const arrowHead = [
    `${TIP.x},${TIP.y}`,
    `${backPt.x + hw*Math.cos(perp)},${backPt.y + hw*Math.sin(perp)}`,
    `${backPt.x - hw*Math.cos(perp)},${backPt.y - hw*Math.sin(perp)}`,
  ].join(" ");

  return (
    <div style={{ display:"flex", flexDirection:"column", alignItems:"center", gap:6 }}>
      <svg width={SIZE} height={SIZE} viewBox={`0 0 ${SIZE} ${SIZE}`}>
        <defs>
          <filter id="compassGlow">
            <feGaussianBlur stdDeviation="3" result="b"/>
            <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>

        {/* Fundo */}
        <circle cx={cx} cy={cy} r={r+10} fill="#060D18"/>
        <circle cx={cx} cy={cy} r={r+2}  fill="none" stroke="#0F2035" strokeWidth={1}/>

        {/* Rosa dos ventos — gira com o dispositivo */}
        <g transform={`rotate(${-deviceHeading},${cx},${cy})`}>
          <circle cx={cx} cy={cy} r={r} fill="none" stroke="#1A3A5C" strokeWidth={1.5}/>

          {/* Ticks a cada 5° */}
          {Array.from({length:72},(_,i) => {
            const deg = i*5;
            const isMain = deg%90===0;
            const isSub  = deg%45===0;
            const outerPt = degToXY(deg, r);
            const innerPt = degToXY(deg, r-(isMain?10:isSub?7:3.5));
            return (
              <line key={deg}
                x1={outerPt.x} y1={outerPt.y}
                x2={innerPt.x} y2={innerPt.y}
                stroke={deg===0?"#EF4444":"#1E3A5F"}
                strokeWidth={isMain?1.5:isSub?1:0.6}/>
            );
          })}

          {/* Letras cardinais */}
          {CARDINALS.map(({deg,label,north}) => {
            const pt = degToXY(deg, r-18);
            return (
              <text key={label} x={pt.x} y={pt.y}
                textAnchor="middle" dominantBaseline="middle"
                fill={north?"#EF4444":"#64748B"}
                fontSize={north?11:9}
                fontFamily="Space Grotesk" fontWeight={700}>
                {label}
              </text>
            );
          })}

          {/* Seta Norte (vermelho) */}
          {(() => {
            const tip  = degToXY(0,   r-24);
            const tail = degToXY(180, r-24);
            return <polygon points={`${tip.x},${tip.y} ${cx-4},${cy} ${cx+4},${cy}`} fill="#EF4444" opacity={0.85}/>;
          })()}
          {(() => {
            const tip  = degToXY(180, r-24);
            return <polygon points={`${tip.x},${tip.y} ${cx-4},${cy} ${cx+4},${cy}`} fill="#334155"/>;
          })()}
        </g>

        {/* Seta do vento — fixa no espaço da tela */}
        <line x1={TAIL.x} y1={TAIL.y} x2={TIP.x} y2={TIP.y}
          stroke="#3B82F6" strokeWidth={2.5} strokeLinecap="round"/>
        <polygon points={arrowHead} fill="#3B82F6" filter="url(#compassGlow)"/>

        {/* Centro */}
        <circle cx={cx} cy={cy} r={18} fill="#0D1F35"/>
        <text x={cx} y={cy-4} textAnchor="middle"
          fill="#3B82F6" fontSize={11}
          fontFamily="JetBrains Mono" fontWeight={700}>
          {v120!=null ? (v120/3.6).toFixed(1) : "--"}
        </text>
        <text x={cx} y={cy+8} textAnchor="middle"
          fill="#475569" fontSize={7} fontFamily="Space Grotesk">m/s</text>
      </svg>

      {/* Botão permissão iOS / status */}
      {!hasOrientation && (
        <button onClick={onRequestPerm} style={{
          fontSize:9, padding:"3px 10px", borderRadius:12,
          border:"1px solid #1E3A5F", background:"transparent",
          color:"#475569", cursor:"pointer", fontFamily:"Space Grotesk",
        }}>
          🧭 Ativar bússola
        </button>
      )}
      {hasOrientation && (
        <span style={{ fontSize:9, color:"#22C55E" }}>🧭 Bússola ativa</span>
      )}
    </div>
  );
}

// ── Níveis de vento (painel ao lado da bússola) v1.4 ──────────────────────────
const fmtKmh = (v) => v != null ? Math.round(v)         : "—";
const fmtMs  = (v) => v != null ? (v / 3.6).toFixed(1)  : "—";

function WindLevels({ v120, gust120, windFromDeg }) {
  const v120Ms   = v120    != null ? v120    / 3.6 : null;
  const gust120Ms= gust120 != null ? gust120 / 3.6 : null;
  const gV = gradeWindMs(v120Ms   ?? 0);
  const gG = gradeWindMs(gust120Ms?? 0);
  const isHighRisk = (v120Ms != null && v120Ms >= 12) || (gust120Ms != null && gust120Ms >= 12);

  const rows = [
    { label:"Vento Constante", sub:"120m AGL ✦", value:v120,    grade:gV },
    { label:"Rajada",          sub:"120m AGL",   value:gust120, grade:gG },
  ];

  return (
    <div style={{ display:"flex", flexDirection:"column", justifyContent:"center", gap:7, flex:1 }}>
      <div style={{ color:"#475569", fontSize:9, textTransform:"uppercase", letterSpacing:"0.08em" }}>
        Velocidade 120m AGL
      </div>

      {rows.map(({ label, sub, value, grade }) => (
        <div key={label} style={{
          padding:"8px 10px", borderRadius:8,
          background:"#0F2040",
          border:`1px solid ${WIND_COL[grade]}55`,
        }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:4 }}>
            <span style={{ color:"#94A3B8", fontSize:10 }}>
              {label} <span style={{ color:"#475569", fontSize:8 }}>{sub}</span>
            </span>
            <span style={{
              fontSize:8, fontWeight:700, letterSpacing:"0.04em",
              background:WIND_BG[grade]+"66", color:WIND_COL[grade],
              padding:"1px 7px", borderRadius:10,
            }}>{WIND_TAG[grade]}</span>
          </div>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"baseline" }}>
            <span style={{ color:WIND_COL[grade], fontFamily:"JetBrains Mono", fontSize:19, fontWeight:700 }}>
              {fmtKmh(value)}
              <span style={{ fontSize:9, fontWeight:400, marginLeft:2, color:"#64748B" }}>km/h</span>
            </span>
            <span style={{ color:WIND_COL[grade], fontFamily:"JetBrains Mono", fontSize:19, fontWeight:700 }}>
              {fmtMs(value)}
              <span style={{ fontSize:9, fontWeight:400, marginLeft:2, color:"#64748B" }}>m/s</span>
            </span>
          </div>
        </div>
      ))}

      {/* Alerta de alto risco operacional */}
      {isHighRisk && (
        <div style={{
          padding:"8px 10px", borderRadius:8,
          background:"#450A0A", border:"1.5px solid #EF4444",
          textAlign:"center",
        }}>
          <div style={{ color:"#FCA5A5", fontSize:12, fontWeight:700, letterSpacing:"0.04em" }}>
            ⛔ ALTO RISCO OPERACIONAL
          </div>
          <div style={{ color:"#F87171", fontSize:9, marginTop:2 }}>
            Vento acima de 12 m/s — voo não recomendado
          </div>
        </div>
      )}

      <div style={{ color:"#334155", fontSize:9 }}>
        Vento de {compass(windFromDeg??0)} ({Math.round(windFromDeg??0)}°)
      </div>
    </div>
  );
}

// ── Arco Solar SVG (v1.1 inalterado) ─────────────────────────────────────────
function SunArc({ sr, ss, now, fs, fe }) {
  if (!sr||!ss) return null;
  const W=340, H=200, cx=W/2, cy=H-18, r=142;
  const srM=toMins(sr), ssM=toMins(ss), nowM=toMins(now);
  const peakM = Math.round((srM+ssM)/2);
  const STD=120, stdL=Math.max(srM,peakM-STD), stdR=Math.min(ssM,peakM+STD);
  const toDeg=(m)=>(1-Math.max(0,Math.min(1,(m-srM)/(ssM-srM))))*180;
  const toXY=(deg)=>{ const rad=deg*Math.PI/180; return{x:cx+r*Math.cos(rad),y:cy-r*Math.sin(rad)}; };
  const srPt=toXY(180), ssPt=toXY(0), peakPt=toXY(90);
  const stdLPt=toXY(toDeg(stdL)), stdRPt=toXY(toDeg(stdR));
  const inDay=nowM>=srM&&nowM<=ssM;
  const sunPt=toXY(Math.max(0,Math.min(180,toDeg(nowM))));
  // Anti-sobreposição: se o sol atual estiver a <60min do pico, separar os rótulos.
  // Pico sobe (labels acima), horário atual desce (abaixo do sol).
  const nearPeak = inDay && Math.abs(nowM - peakM) < 60;
  const userStart = Math.max(fs, srM);
  const userEnd   = Math.min(fe, ssM);
  const fwL=toXY(toDeg(userStart)), fwR=toXY(toDeg(userEnd));
  const showFw=fs<ssM&&fe>srM;
  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",display:"block"}}>
      <defs>
        <radialGradient id="skyBg2" cx="50%" cy="95%" r="100%">
          <stop offset="0%"   stopColor="#1A3A5C"/>

// ── Timeline (v1.1 inalterada) ────────────────────────────────────────────────
const OFFSET_OPTS = [1,2,3,4];
function FlightTimeline({ sr, ss, fs, fe, now, onChange, onReset, peakM, twilightMins }) {
  const srM=toMins(sr)||360, ssM=toMins(ss)||1080;
  const pm=peakM!=null?peakM:Math.round((srM+ssM)/2);
  const nowM=toMins(now);
  const twMin=twilightMins??30;
  // Escala "zoom": a barra vai do início do crepúsculo civil (dawn) ao fim (dusk).
  // Sem noite — só crepúsculo civil + dia, dando muito mais resolução à janela útil.
  const dawn=Math.max(0,srM-twMin), dusk=Math.min(1440,ssM+twMin);
  const spanM = Math.max(60, dusk-dawn);
  const pct=(m)=>((Math.max(dawn,Math.min(dusk,m))-dawn)/spanM)*100;
  const dur=fe-fs;
  const halfDur=(fe-fs)/2;
  const isCentered=Math.abs(fs-(pm-halfDur))<16;
  const applyOffset=(h)=>onChange(Math.max(srM,pm-h*60),Math.min(ssM,pm+h*60));
  // zonas: crepúsculo (dawn→sr), dia (sr→ss), crepúsculo (ss→dusk)
  const zones=[[dawn,srM,"#3B0764"],[srM,ssM,"#1E3A8A"],[ssM,dusk,"#3B0764"]].filter(([s,e])=>e>s);
  return (
    <div>
      <div style={{textAlign:"center",marginBottom:12}}>
        <div style={{color:"#64748B",fontSize:9,textTransform:"uppercase",letterSpacing:"0.1em"}}>Pico solar</div>
        <div style={{color:"#FCD34D",fontFamily:"JetBrains Mono",fontSize:22,fontWeight:700,lineHeight:1.1}}>{toHM(pm)}</div>
      </div>
      <div style={{marginBottom:14}}>
        <div style={{color:"#475569",fontSize:9,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:6,textAlign:"center"}}>Janela centrada no pico</div>
        <div style={{display:"flex",gap:5,justifyContent:"center"}}>
          {OFFSET_OPTS.map(h=>{
            const isDef=h===2, isSel=isCentered&&Math.abs(halfDur-h*60)<16;
            return(
              <button key={h} onClick={()=>applyOffset(h)} style={{
                border:isSel?"1.5px solid #3B82F6":isDef?"1px solid #F59E0B":"1px solid #1E3A5F",
                borderRadius:16, background:isSel?"#1D4ED844":isDef?"#78350F44":"transparent",
                color:isSel?"#93C5FD":isDef?"#F59E0B":"#60A5FA",
                fontSize:11, padding:"5px 10px", cursor:"pointer", fontFamily:"Space Grotesk", fontWeight:isDef?700:400,
              }}>±{h}h{isDef?" ★":""}</button>
            );
          })}
        </div>
      </div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
        <div>
          <div style={{color:"#475569",fontSize:10,textTransform:"uppercase",letterSpacing:"0.06em"}}>Início</div>
          <div style={{color:"#60A5FA",fontFamily:"JetBrains Mono",fontSize:18,fontWeight:700}}>{toHM(fs)}</div>
        </div>
        <div style={{textAlign:"center"}}>
          <div style={{color:"#64748B",fontSize:12}}>{Math.floor(dur/60)}h{dur%60?` ${dur%60}m`:""}</div>
          <button onClick={onReset} style={{marginTop:5,border:"1px solid #1E3A5F",borderRadius:20,background:"transparent",color:"#60A5FA",fontSize:10,padding:"3px 10px",cursor:"pointer",fontFamily:"Space Grotesk"}}>☀️ Luz do dia</button>
        </div>
        <div style={{textAlign:"right"}}>
          <div style={{color:"#475569",fontSize:10,textTransform:"uppercase",letterSpacing:"0.06em"}}>Fim</div>
          <div style={{color:"#60A5FA",fontFamily:"JetBrains Mono",fontSize:18,fontWeight:700}}>{toHM(fe)}</div>
        </div>
      </div>
      <div data-track style={{position:"relative",height:36}}>
        <div style={{position:"absolute",top:7,bottom:7,left:0,right:0,borderRadius:10,overflow:"hidden"}}>
          {zones.map(([s,e,c],i)=>(<div key={i} style={{position:"absolute",top:0,bottom:0,left:`${pct(s)}%`,width:`${pct(e)-pct(s)}%`,background:c}}/>))}
          <div style={{position:"absolute",top:0,bottom:0,left:`${pct(Math.max(srM,pm-120))}%`,width:`${pct(Math.min(ssM,pm+120))-pct(Math.max(srM,pm-120))}%`,background:"#F59E0B",opacity:0.18}}/>
          <div style={{position:"absolute",top:0,bottom:0,left:`${pct(fs)}%`,width:`${pct(fe)-pct(fs)}%`,background:"linear-gradient(90deg,#1D4ED8,#3B82F6)",opacity:0.9}}/>
          <div style={{position:"absolute",top:0,bottom:0,left:`${pct(pm)}%`,width:2,background:"#FCD34D",opacity:0.9,zIndex:9}}/>
          <div style={{position:"absolute",top:0,bottom:0,left:`${pct(nowM)}%`,width:2,background:"#F59E0B",zIndex:8}}/>
        </div>
        <Thumb pct={pct(fs)} minM={dawn} spanM={spanM} onDrag={(m)=>m<fe-15&&onChange(Math.max(dawn,m),fe)}/>
        <Thumb pct={pct(fe)} minM={dawn} spanM={spanM} onDrag={(m)=>m>fs+15&&onChange(fs,Math.min(dusk,m))}/>
      </div>
      <div style={{position:"relative",height:14,marginTop:5}}>
        {(() => {
          // marcas de hora dentro do intervalo visível (dawn→dusk)
          const marks=[]; const h0=Math.ceil(dawn/60), h1=Math.floor(dusk/60);
          const stepH = (h1-h0)>8 ? 2 : 1;
          for(let h=h0; h<=h1; h+=stepH) marks.push(h);
          return marks.map(h=>(
            <span key={h} style={{color:"#1E3A5F",fontSize:9,fontFamily:"JetBrains Mono",
              position:"absolute",left:`${pct(h*60)}%`,transform:"translateX(-50%)"}}>{Z2(h)}h</span>
          ));
        })()}
      </div>
      <div style={{display:"flex",gap:10,marginTop:10,justifyContent:"center",flexWrap:"wrap"}}>
        {[["#3B0764","Crepúsculo civil"],["#1E3A8A","Dia"],["#F59E0B","Padrão ±2h"],["#3B82F6","Sua janela"],["#FCD34D","Pico"]].map(([c,l])=>(
          <div key={l} style={{display:"flex",alignItems:"center",gap:4}}>
            <div style={{width:10,height:10,borderRadius:2,background:c,flexShrink:0}}/>

  );
}

// ── Gráfico de previsão horária de vento 120m ────────────────────────────────
function WindForecastChart({ data }) {
  if (!data || !data.length) return null;
  const W = 320, H = 130, padL = 28, padR = 10, padT = 14, padB = 22;
  const plotW = W - padL - padR, plotH = H - padT - padB;

  const winds = data.map(d => d.wind ?? 0);
  const gusts = data.map(d => d.gust ?? 0);
  const maxV = Math.max(12, ...winds, ...gusts) * 1.1;  // teto mínimo 12 p/ escala de risco
  const n = data.length;

  const x = (i) => padL + (n<=1 ? 0 : (i/(n-1))*plotW);
  const y = (v) => padT + plotH - (v/maxV)*plotH;

  // Cor por intensidade (km/h → m/s): verde ≤10, laranja 10-12, vermelho ≥12 m/s
  const colorForKmh = (kmh) => {
    const ms = kmh / 3.6;
    return ms <= 10.0 ? "#22C55E" : ms < 12.0 ? "#F97316" : "#EF4444";
  };
  // Cor de um segmento entre dois pontos = a mais severa dos dois extremos
  const segColor = (a, b) => {
    const ca = colorForKmh(a), cb = colorForKmh(b);
    const sev = { "#22C55E":0, "#F97316":1, "#EF4444":2 };
    return sev[ca] >= sev[cb] ? ca : cb;
  };

  // Linhas de referência m/s (10 e 12 m/s → km/h)
  const refs = [
    { ms:10, kmh:36,   color:"#F97316", label:"10 m/s" },
    { ms:12, kmh:43.2, color:"#EF4444", label:"12 m/s" },
  ].filter(r => r.kmh <= maxV);

  // Constrói os segmentos individuais (para colorir cada trecho)
  const segments = (arr) => arr.slice(1).map((v,i) => ({
    x1:x(i),   y1:y(arr[i]),
    x2:x(i+1), y2:y(v),
    color: segColor(arr[i], v),
  }));
  const windSegs = segments(winds);
  const gustSegs = segments(gusts);
  const areaPath = `${gusts.map((v,i)=>`${i?"L":"M"}${x(i).toFixed(1)},${y(v).toFixed(1)}`).join(" ")} L${x(n-1)},${y(0)} L${x(0)},${y(0)} Z`;

  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{ width:"100%", display:"block" }}>
      {/* Linhas de referência de risco */}
      {refs.map(r => (
        <g key={r.ms}>
          <line x1={padL} y1={y(r.kmh)} x2={W-padR} y2={y(r.kmh)}
            stroke={r.color} strokeWidth={1} strokeDasharray="3 3" opacity={0.4}/>
          <text x={W-padR} y={y(r.kmh)-2} textAnchor="end" fill={r.color} fontSize={7} opacity={0.7}>{r.label}</text>
        </g>
      ))}
      {/* Eixo Y labels (km/h) */}
      {[0, Math.round(maxV/2), Math.round(maxV)].map((v,i) => (
        <text key={i} x={padL-4} y={y(v)+3} textAnchor="end" fill="#334155" fontSize={7} fontFamily="JetBrains Mono">{v}</text>
      ))}
      {/* Área sob a rajada */}
      <path d={areaPath} fill="#EF4444" opacity={0.06}/>
      {/* Rajada — segmentos coloridos, tracejado */}
      {gustSegs.map((s,i) => (
        <line key={"g"+i} x1={s.x1} y1={s.y1} x2={s.x2} y2={s.y2}
          stroke={s.color} strokeWidth={1.5} strokeDasharray="3 2" opacity={0.65} strokeLinecap="round"/>
      ))}
      {/* Vento constante — segmentos coloridos, sólido */}
      {windSegs.map((s,i) => (
        <line key={"w"+i} x1={s.x1} y1={s.y1} x2={s.x2} y2={s.y2}
          stroke={s.color} strokeWidth={2.5} strokeLinecap="round"/>
      ))}
      {/* Pontos do vento, coloridos por risco individual */}
      {data.map((d,i) => (
        <circle key={i} cx={x(i)} cy={y(d.wind??0)} r={2.2} fill={colorForKmh(d.wind??0)}/>
      ))}
      {/* Labels de hora (a cada 3) */}
      {data.map((d,i) => (i%3===0) && (
        <text key={"t"+i} x={x(i)} y={H-6} textAnchor="middle" fill="#475569" fontSize={7} fontFamily="JetBrains Mono">
          {String(d.time.getHours()).padStart(2,"0")}h
        </text>
      ))}
    </svg>
  );
}
