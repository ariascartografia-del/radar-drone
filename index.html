// ── Helpers METAR (decodificação dos campos da observação) ───────────────────
function metarWindDir(deg){
  if (deg == null || deg === "VRB") return "VRB";
  return compass(deg) + " " + deg + "°";
}
function metarVisib(v){
  if (v == null) return "—";
  // "10+" significa ≥10 km (ou ≥10 SM dependendo); tratamos como 10+ km
  if (typeof v === "string" && v.includes("+")) return "10+ km";
  const num = parseFloat(v);
  return isNaN(num) ? String(v) : num.toFixed(num<10?1:0) + " km";
}
function metarIsCavok(m){
  if (!m) return false;
  if (m.rawOb && /\bCAVOK\b/.test(m.rawOb)) return true;
  // deriva: vis ≥10 e sem nuvens abaixo de 1500m
  const vis10 = (typeof m.visib === "string" && m.visib.includes("+")) || parseFloat(m.visib) >= 10;
  const noLowClouds = !m.clouds || m.clouds.every(c => c.cover==="CLR" || c.cover==="SKC" || c.cover==="NCD" || (c.base!=null && c.base*0.3048 >= 1500));
  return vis10 && noLowClouds;
}
function metarAgeMin(m){
  if (!m || !m.obsTime) return null;
  return Math.round((Date.now()/1000 - m.obsTime)/60);
}
const KT_TO_KMH = 1.852;

// Distância aproximada (km) entre duas coords (haversine simplificado)
function distKm(la1,lo1,la2,lo2){
  const R=6371, rad=Math.PI/180;
  const dLa=(la2-la1)*rad, dLo=(lo2-lo1)*rad;
  const a=Math.sin(dLa/2)**2 + Math.cos(la1*rad)*Math.cos(la2*rad)*Math.sin(dLo/2)**2;
  return 2*R*Math.asin(Math.sqrt(a));
}
// Busca a estação METAR mais próxima via bounding box do aviationweather.gov.
// Retorna o objeto METAR completo (já é a observação) ou null.
async function fetchNearestMetar(lat, lon){
  // caixa de ~±2.2° (~240km) ao redor do ponto
  const d = 2.2;
  const bbox = `${(lat-d).toFixed(2)},${(lon-d).toFixed(2)},${(lat+d).toFixed(2)},${(lon+d).toFixed(2)}`;
  const base = `https://aviationweather.gov/api/data/metar?bbox=${bbox}&format=json`;
  const attempts = [
    { url: base, wrap:false },
    { url: "https://api.allorigins.win/get?url=" + encodeURIComponent(base), wrap:true },
    { url: "https://corsproxy.io/?url=" + encodeURIComponent(base), wrap:false },
    { url: "https://api.codetabs.com/v1/proxy/?quest=" + encodeURIComponent(base), wrap:false },
  ];
  for (const { url } of attempts){
    try {
      const r = await fetch(url);
      if(!r.ok) continue;
      let txt = await r.text();
      if(!txt || !txt.trim()) continue;
      let data;
      try { data = JSON.parse(txt); } catch { continue; }
      if (data && typeof data==="object" && typeof data.contents==="string"){
        try { data = JSON.parse(data.contents); } catch { continue; }
      }
      if (!Array.isArray(data) || !data.length) continue;
      // escolhe a estação válida mais próxima
      const valid = data.filter(m => (m.rawOb || m.temp!=null) && m.lat!=null && m.lon!=null);
      if (!valid.length) continue;
      valid.sort((a,b) => distKm(lat,lon,a.lat,a.lon) - distKm(lat,lon,b.lat,b.lon));
      const best = valid[0];
      best._distKm = Math.round(distKm(lat,lon,best.lat,best.lon));
      return best;
    } catch(e){ /* tenta próximo */ }
  }
  return null;
}
// Fallback: busca por ICAO específico
async function fetchMetarByIcao(icao){
  const base = `https://aviationweather.gov/api/data/metar?ids=${icao}&format=json`;
  const attempts = [
    base,
    "https://api.allorigins.win/get?url=" + encodeURIComponent(base),
    "https://corsproxy.io/?url=" + encodeURIComponent(base),
  ];
  for (const url of attempts){
    try {
      const r = await fetch(url); if(!r.ok) continue;
      let txt = await r.text(); if(!txt||!txt.trim()) continue;
      let data; try { data = JSON.parse(txt); } catch { continue; }
      if (data && typeof data==="object" && typeof data.contents==="string"){
        try { data = JSON.parse(data.contents); } catch { continue; }
      }
      const m = Array.isArray(data) ? (data.find(x=>x.icaoId===icao)||data[0]) : data;
      if (m && (m.rawOb || m.temp!=null)) return m;
    } catch(e){}
  }
  return null;
}

// ── Domo solar 3D com sombra projetada + janela de voo + trópicos ────────────
function SunDome3D({ lat, lon, dateKey, sunMin, fs, fe, utcOffsetSec }){
  const mountRef = useRef(null);
  const S = useRef({});

  // Init (uma vez)
  useEffect(() => {
    if (typeof THREE === "undefined" || !mountRef.current) return;
    const mount = mountRef.current;
    const W = mount.clientWidth || 320, H = mount.clientHeight || 320;
    const R = 10, GNO_H = 3.0;

    const scene = new THREE.Scene();
    scene.fog = new THREE.Fog(0x080F1A, 16, 42);
    const camera = new THREE.PerspectiveCamera(50, W/H, 0.1, 200);
    const renderer = new THREE.WebGLRenderer({ antialias:true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(W, H);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    mount.appendChild(renderer.domElement);
    renderer.domElement.style.touchAction = "none";

    // Chão
    const ground = new THREE.Mesh(
      new THREE.CircleGeometry(R*1.15, 64),
      new THREE.MeshStandardMaterial({ color:0x101A2E, roughness:.95 })
    );
    ground.rotation.x = -Math.PI/2; ground.receiveShadow = true;
    scene.add(ground);
    const grid = new THREE.PolarGridHelper(R*1.1, 8, 6, 64, 0x1E2A42, 0x172238);
    grid.position.y = 0.01; scene.add(grid);

    // Cardeais
    const mkLabel = (txt, color) => {
      const c = document.createElement("canvas"); c.width=c.height=128;
      const ctx=c.getContext("2d"); ctx.fillStyle=color;
      ctx.font="bold 78px Space Grotesk, sans-serif"; ctx.textAlign="center"; ctx.textBaseline="middle";
      ctx.fillText(txt,64,68);
      const sp=new THREE.Sprite(new THREE.SpriteMaterial({ map:new THREE.CanvasTexture(c), transparent:true }));
      sp.scale.set(1.5,1.5,1.5); return sp;
    };
    [["N",0,"#5BA9F5"],["L",90,"#7C8AA5"],["S",180,"#7C8AA5"],["O",270,"#7C8AA5"]].forEach(([t,d,col])=>{
      const a=d*Math.PI/180; const l=mkLabel(t,col);
      l.position.set(Math.sin(a)*R*1.04, 0.7, Math.cos(a)*R*1.04); scene.add(l);
    });

    // Gnômon
    const gnomon = new THREE.Mesh(
      new THREE.CylinderGeometry(0.12,0.16,GNO_H,16),
      new THREE.MeshStandardMaterial({ color:0xB05A2A, roughness:.6 })
    );
    gnomon.position.y=GNO_H/2; gnomon.castShadow=true; scene.add(gnomon);
    const gnomonTop = new THREE.Mesh(
      new THREE.SphereGeometry(0.2,16,16),
      new THREE.MeshStandardMaterial({ color:0xD56A35, roughness:.5 })
    );
    gnomonTop.position.y=GNO_H; gnomonTop.castShadow=true; scene.add(gnomonTop);

    // Luzes
    const sunLight = new THREE.DirectionalLight(0xFFF4E0, 1.4);
    sunLight.castShadow=true; sunLight.shadow.mapSize.set(1024,1024);
    sunLight.shadow.camera.near=0.5; sunLight.shadow.camera.far=60;
    sunLight.shadow.camera.left=-R*1.3; sunLight.shadow.camera.right=R*1.3;
    sunLight.shadow.camera.top=R*1.3; sunLight.shadow.camera.bottom=-R*1.3;
    scene.add(sunLight); scene.add(sunLight.target);
    scene.add(new THREE.AmbientLight(0x3A4866, 0.7));
    const hemi = new THREE.HemisphereLight(0x8FB4FF, 0x080F1A, 0.5); scene.add(hemi);

    // Sol
    const sunMesh = new THREE.Mesh(new THREE.SphereGeometry(0.55,24,24), new THREE.MeshBasicMaterial({ color:0xFFD54A }));
    scene.add(sunMesh);
    const sunGlow = new THREE.Mesh(new THREE.SphereGeometry(0.95,24,24), new THREE.MeshBasicMaterial({ color:0xFFD54A, transparent:true, opacity:0.16 }));
    scene.add(sunGlow);

    // Marcador do pico solar (círculo amarelo no ponto de altitude máxima)
    const peakMarker = new THREE.Mesh(
      new THREE.SphereGeometry(0.38,20,20),
      new THREE.MeshBasicMaterial({ color:0xFCD34D })
    );
    peakMarker.visible = false; scene.add(peakMarker);
    const peakRing = new THREE.Mesh(
      new THREE.RingGeometry(0.5,0.66,28),
      new THREE.MeshBasicMaterial({ color:0xFCD34D, transparent:true, opacity:0.6, side:THREE.DoubleSide })
    );
    peakRing.visible = false; scene.add(peakRing);

    // Câmera orbital
    const cam = { az:35*Math.PI/180, pol:58*Math.PI/180, dist:24 };
    const applyCam = () => {
      cam.pol = Math.max(0.15, Math.min(Math.PI/2-0.02, cam.pol));
      cam.dist = Math.max(13, Math.min(38, cam.dist));
      camera.position.set(
        cam.dist*Math.sin(cam.pol)*Math.sin(cam.az),
        cam.dist*Math.cos(cam.pol),
        cam.dist*Math.sin(cam.pol)*Math.cos(cam.az)
      );
      camera.lookAt(0,1.4,0);
    };
    applyCam();

    let drag=false, lx=0, ly=0, pinch=0;
    const el = renderer.domElement;
    const onDown=(e)=>{drag=true; lx=e.clientX; ly=e.clientY;};
    const onMove=(e)=>{ if(!drag)return; cam.az-=(e.clientX-lx)*0.008; cam.pol-=(e.clientY-ly)*0.006; lx=e.clientX; ly=e.clientY; applyCam(); };
    const onUp=()=>{drag=false;};
    const onWheel=(e)=>{ e.preventDefault(); cam.dist+=e.deltaY*0.02; applyCam(); };
    const onTouch=(e)=>{ if(e.touches.length===2){ const dx=e.touches[0].clientX-e.touches[1].clientX, dy=e.touches[0].clientY-e.touches[1].clientY, d=Math.hypot(dx,dy); if(pinch) { cam.dist+=(pinch-d)*0.05; applyCam(); } pinch=d; } };
    const onTouchEnd=()=>{pinch=0;};
    el.addEventListener("pointerdown",onDown); el.addEventListener("pointermove",onMove);
    el.addEventListener("pointerup",onUp); el.addEventListener("pointercancel",onUp);
    el.addEventListener("wheel",onWheel,{passive:false});
    el.addEventListener("touchmove",onTouch,{passive:true}); el.addEventListener("touchend",onTouchEnd);

    const onResize=()=>{ const w=mount.clientWidth, h=mount.clientHeight||320; renderer.setSize(w,h); camera.aspect=w/h; camera.updateProjectionMatrix(); };
    window.addEventListener("resize", onResize);

    let raf=0;
    const loop=()=>{ raf=requestAnimationFrame(loop); sunGlow.material.opacity=0.12+0.05*Math.sin(Date.now()*0.002); renderer.render(scene,camera); };
    loop();

    S.current = { scene, camera, renderer, R, GNO_H, sunLight, hemi, sunMesh, sunGlow,
      arcLine:null, fwArcs:[], fwDots:[], azLine:null, tropics:[], peakMarker, peakRing, applyCam, cam, raf, el,
      handlers:{onDown,onMove,onUp,onWheel,onTouch,onTouchEnd,onResize} };

    return () => {
      cancelAnimationFrame(S.current.raf);
      el.removeEventListener("pointerdown",onDown); el.removeEventListener("pointermove",onMove);
      el.removeEventListener("pointerup",onUp); el.removeEventListener("pointercancel",onUp);
      el.removeEventListener("wheel",onWheel); el.removeEventListener("touchmove",onTouch); el.removeEventListener("touchend",onTouchEnd);
      window.removeEventListener("resize",onResize);
      renderer.dispose();
      if (el.parentNode) el.parentNode.removeChild(el);
    };
  }, []);

  // Reconstrói arco do dia + trópicos + pico (muda com data/local/fuso)
  useEffect(() => {
    const s = S.current; if (!s || !s.scene) return;
    const THREEref = THREE, R = s.R;
    const [y,m,d] = dateKey.split("-").map(Number);
    const off = utcOffsetSec ?? (-3*3600);

    // Limpa antigos
    if (s.arcLine){ s.arcLine.forEach? s.arcLine.forEach(l=>{s.scene.remove(l);l.geometry.dispose();}) : (s.scene.remove(s.arcLine), s.arcLine.geometry.dispose()); s.arcLine=null; }
    s.tropics.forEach(t => { s.scene.remove(t); t.geometry && t.geometry.dispose(); });
    s.tropics = [];

    // Trópicos / Equador — destaque aumentado (mais opacos, linha sólida fina)
    const refs = [
      { decl:23.44,  color:0x93A4C8, op:0.6 },   // Câncer
      { decl:0,      color:0x6EE7F0, op:0.55 },   // Equador (ciano sutil)
      { decl:-23.44, color:0x93A4C8, op:0.6 },   // Capricórnio
    ];
    refs.forEach(r => {
      const pts = declArcPts(THREEref, r.decl, lat, R);
      if (pts.length < 2) return;
      const line = new THREEref.Line(
        new THREEref.BufferGeometry().setFromPoints(pts),
        new THREEref.LineDashedMaterial({ color:r.color, dashSize:0.5, gapSize:0.3, transparent:true, opacity:r.op })
      );
      line.computeLineDistances();
      s.scene.add(line); s.tropics.push(line);
    });

    // Arco do dia (amber) — fuso correto + quebra no zênite + acha o pico
    const samples = [];
    let peak = { alt:-99, v:null };
    for (let mm=0; mm<=1440; mm+=4){
      const dt = localMinToDate(y, m, d, mm, off);
      const sp = solarPosition(dt, lat, lon);
      if (sp.altitude > 0){
        const v = sunVec3D(THREEref, sp.azimuth, sp.altitude, R);
        samples.push({ az:sp.azimuth, v });
        if (sp.altitude > peak.alt) peak = { alt:sp.altitude, v };
      }
    }
    const segs = splitOnAzJump(samples);
    s.arcLine = [];
    segs.forEach(seg => {
      if (seg.length < 2) return;
      const line = new THREEref.Line(
        new THREEref.BufferGeometry().setFromPoints(seg),
        new THREEref.LineBasicMaterial({ color:0xF5A623, transparent:true, opacity:0.65 })
      );
      s.scene.add(line); s.arcLine.push(line);
    });

    // Marcador do pico solar (círculo amarelo)
    if (peak.v){
      s.peakMarker.position.copy(peak.v); s.peakMarker.visible = true;
      s.peakRing.position.copy(peak.v);
      s.peakRing.lookAt(0,0,0); s.peakRing.visible = true;
    } else {
      s.peakMarker.visible = false; s.peakRing.visible = false;
    }
  }, [dateKey, lat, lon, utcOffsetSec]);

  // Arco da janela de voo (azul) — fuso correto + quebra no zênite
  useEffect(() => {
    const s = S.current; if (!s || !s.scene) return;
    const THREEref = THREE, R = s.R;
    const [y,m,d] = dateKey.split("-").map(Number);
    const off = utcOffsetSec ?? (-3*3600);

    // limpa arcos e dots antigos
    (s.fwArcs||[]).forEach(l => { s.scene.remove(l); l.geometry.dispose(); });
    s.fwArcs = [];
    s.fwDots.forEach(dt => { s.scene.remove(dt); dt.geometry.dispose(); });
    s.fwDots = [];

    // Coleta só o trecho DIURNO da janela (altitude > 0).
    const samples = [];
    for (let mm=fs; mm<=fe; mm+=2){
      const dt = localMinToDate(y, m, d, mm, off);
      const sp = solarPosition(dt, lat, lon);
      if (sp.altitude > 0) samples.push({ az:sp.azimuth, v: sunVec3D(THREEref, sp.azimuth, sp.altitude, R*1.008) });
    }
    const segs = splitOnAzJump(samples);
    segs.forEach(seg => {
      if (seg.length < 2) return;
      const line = new THREEref.Line(
        new THREEref.BufferGeometry().setFromPoints(seg),
        new THREEref.LineBasicMaterial({ color:0x3B82F6 })
      );
      s.scene.add(line); s.fwArcs.push(line);
    });
    // dots no primeiro e último ponto diurno
    if (samples.length >= 2){
      [samples[0].v, samples[samples.length-1].v].forEach(v => {
        const dot = new THREEref.Mesh(new THREEref.SphereGeometry(0.22,16,16), new THREEref.MeshBasicMaterial({ color:0x60A5FA }));
        dot.position.copy(v); s.scene.add(dot); s.fwDots.push(dot);
      });
    }
  }, [fs, fe, dateKey, lat, lon, utcOffsetSec]);

  // Atualiza posição do sol (muda com hora/data/local/fuso)
  useEffect(() => {
    const s = S.current; if (!s || !s.scene) return;
    const THREEref = THREE, R = s.R;
    const [y,m,d] = dateKey.split("-").map(Number);
    const off = utcOffsetSec ?? (-3*3600);
    const dt = localMinToDate(y, m, d, sunMin, off);
    const sp = solarPosition(dt, lat, lon);
    const pos = sunVec3D(THREEref, sp.azimuth, sp.altitude, R);
    const above = sp.altitude > 0;

    s.sunMesh.position.copy(pos); s.sunGlow.position.copy(pos);
    s.sunMesh.visible = sp.altitude > -3; s.sunGlow.visible = above;
    s.sunLight.position.copy(pos); s.sunLight.target.position.set(0,0,0);
    s.sunLight.intensity = above ? 1.4 : 0.0;
    s.hemi.intensity = above ? 0.5 : 0.15;
    const warm = Math.max(0, 1 - sp.altitude/25);
    s.sunMesh.material.color.setRGB(1, 0.83 - warm*0.25, 0.29 - warm*0.15);

    if (s.azLine){ s.scene.remove(s.azLine); s.azLine.geometry.dispose(); s.azLine=null; }
    if (above){
      const gp = new THREEref.Vector3(pos.x, 0.02, pos.z);
      s.azLine = new THREEref.Line(
        new THREEref.BufferGeometry().setFromPoints([pos, gp]),
        new THREEref.LineDashedMaterial({ color:0xF5A623, dashSize:0.4, gapSize:0.3, transparent:true, opacity:0.5 })
      );
      s.azLine.computeLineDistances(); s.scene.add(s.azLine);
    }
  }, [sunMin, dateKey, lat, lon, utcOffsetSec]);

  return <div ref={mountRef} style={{ width:"100%", height:340, borderRadius:12, overflow:"hidden", background:"#080F1A" }}/>;
}

// ── App principal ──────────────────────────────────────────────────────────────
function App() {
  const [locName,     setLocName]     = useState("");
  const [wx,          setWx]          = useState(null);
  const [precip,      setPrecip]      = useState(null);
  const [w80,         setW80]         = useState(null);
  const [gust10,      setGust10]      = useState(null);
  const [kp,          setKp]          = useState(null);
  const [sr,          setSr]          = useState(null);
  const [ss,          setSs]          = useState(null);
  const [loading,     setLoading]     = useState(true);
  const [error,       setError]       = useState(null);
  const [now,         setNow]         = useState(new Date());
  const [fs,          setFs]          = useState(8*60);
  const [fe,          setFe]          = useState(17*60);
  const [coords,      setCoords]      = useState({lat:-22.1209, lon:-51.3886});
  const [sun3DMin,    setSun3DMin]    = useState(new Date().getHours()*60 + new Date().getMinutes());
  const [deviceHead,  setDeviceHead]  = useState(0);
  const [hasOrient,   setHasOrient]   = useState(false);
  const [twilightMins, setTwilightMins] = useState(30);
  const [windSource, setWindSource] = useState("openmeteo"); // "tomorrow" | "openmeteo"
  const [v120Direct, setV120Direct] = useState(null);  // km/h — vento real 120m (Tomorrow)
  const [g120Direct, setG120Direct] = useState(null);  // km/h — rajada real 120m (Tomorrow)
  const [extra, setExtra] = useState(null);            // teto, orvalho, UV, pressão (Tomorrow)
  const [windForecast, setWindForecast] = useState(null); // previsão horária vento 120m
  const [kpForecast, setKpForecast] = useState(null);  // previsão Kp 3 dias (NOAA)
  const [metar, setMetar] = useState(null);            // observação METAR oficial (aviationweather.gov)
  const [metarErr, setMetarErr] = useState(null);      // motivo de falha do METAR (diagnóstico)
  const [placeQuery, setPlaceQuery] = useState("");    // busca manual de cidade/ICAO
  const [placeSearching, setPlaceSearching] = useState(false);
  const [placeErr, setPlaceErr] = useState(null);
  const [reloadKey, setReloadKey] = useState(0);       // força recarregar clima ao mudar local manual
  const [utcOffsetSec, setUtcOffsetSec] = useState(-3*3600); // fuso do local-alvo (Open-Meteo)
  const [aba, setAba] = useState("meteo");             // módulo ativo: meteo | espaco | radar
  const espacoIframeRef = useRef(null);                // iframe do AirspaceMap
  const radarIframeRef = useRef(null);                 // iframe do Radar

  // Sincroniza o local com o módulo Radar (iframe) quando coords mudam
  useEffect(() => {
    const ifr = radarIframeRef.current;
    if (aba === "radar" && ifr && ifr.contentWindow) {
      ifr.contentWindow.postMessage(
        { tipo: "setLocal", lat: coords.lat, lon: coords.lon },
        "*"
      );
    }
  }, [coords, aba]);
  const [isDesktop, setIsDesktop] = useState(typeof window!=="undefined" && window.innerWidth >= 900);

  // Detecta largura da tela para layout responsivo (dashboard no desktop)
  useEffect(() => {
    const onResize = () => setIsDesktop(window.innerWidth >= 900);
    window.addEventListener("resize", onResize);
    return () => window.removeEventListener("resize", onResize);
  }, []);

  // Sincroniza o local com o módulo Espaço Aéreo (iframe) quando coords mudam
  useEffect(() => {
    const ifr = espacoIframeRef.current;
    if (aba === "espaco" && ifr && ifr.contentWindow) {
      ifr.contentWindow.postMessage(
        { tipo: "setLocal", lat: coords.lat, lon: coords.lon },
        "*"
      );
    }
  }, [coords, aba]);

  // Relógio
  useEffect(() => {
    const id = setInterval(()=>setNow(new Date()), 30_000);
    return ()=>clearInterval(id);
  }, []);

  // Orientação do dispositivo (bússola)
  const startOrientation = () => {
    const handler = (e) => {
      setHasOrient(true);
      if (e.webkitCompassHeading != null) {
        setDeviceHead(e.webkitCompassHeading);          // iOS (true north)
      } else if (e.absolute && e.alpha != null) {
        setDeviceHead((360 - e.alpha + 360) % 360);    // Android absolute
      } else if (e.alpha != null) {
        setDeviceHead((360 - e.alpha + 360) % 360);    // Android fallback
      }
    };
    if (typeof DeviceOrientationEvent !== "undefined" &&
        typeof DeviceOrientationEvent.requestPermission === "function") {
      // iOS 13+
      DeviceOrientationEvent.requestPermission()
        .then(perm => {
          if (perm === "granted") {
            window.addEventListener("deviceorientation", handler, true);
          }
        }).catch(console.error);
    } else {
      window.addEventListener("deviceorientationabsolute", handler, true);
      window.addEventListener("deviceorientation", handler, true);
    }
  };

  useEffect(() => {
    startOrientation();
    return () => {};
  }, []);

  // Dados meteorológicos
  const fetchWeatherRef = useRef(null);
  useEffect(() => {
    const DEFAULT_LAT = -22.1209, DEFAULT_LON = -51.3886;
    const DEFAULT_NAME = "Presidente Prudente, SP";

    const fetchWeather = async (lat, lon, forcedName) => {
      // Crepúsculo civil calculado astronomicamente para lat/lon do voo
      const twMin = calcCivilTwilightOffset(new Date(), lat);
      setTwilightMins(twMin);
      setCoords({ lat, lon });
      if (forcedName) setLocName(forcedName);

      try {
        // Geocodificação reversa
        if (lat !== DEFAULT_LAT || lon !== DEFAULT_LON) {
          const geo = await fetch(
            `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`,
            { headers:{"Accept-Language":"pt-BR","User-Agent":"DroneWeatherApp/1.2"} }
          ).then(r=>r.json());
          const a = geo.address;
          setLocName([a.city||a.town||a.village||a.county||a.municipality,a.state_code||a.state].filter(Boolean).join(", "));
        }

        // ── Tentativa 1: Tomorrow.io (fonte principal) ──────────────────────
        // Fornece vento E rajada reais em 120m AGL (sem extrapolação)
        let tomorrowOK = false;
        if (TOMORROW_API_KEY) {
          try {
            const tmFields = "windSpeed,windGust,windDirection,cloudCeiling,dewPoint,uvIndex,pressureSurfaceLevel,visibility";
            const tmUrl = "https://api.tomorrow.io/v4/timelines"
              + `?location=${lat},${lon}`
              + `&fields=${tmFields}`
              + "&timesteps=current,1h"
              + "&units=metric"
              + "&altitudes=120"            // 120m AGL
              + `&apikey=${TOMORROW_API_KEY}`;
            const tm = await fetch(tmUrl).then(r => {
              if (!r.ok) throw new Error("HTTP " + r.status);
              return r.json();
            });
            const timelines = tm?.data?.timelines || [];
            const curTl = timelines.find(t => t.timestep === "current") || timelines[0];
            const hourlyTl = timelines.find(t => t.timestep === "1h");
            const iv = curTl?.intervals?.[0]?.values;
            if (iv && iv.windSpeed != null) {
              // Tomorrow.io retorna m/s → converter para km/h
              setV120Direct(iv.windSpeed * 3.6);
              setG120Direct(iv.windGust != null ? iv.windGust * 3.6 : iv.windSpeed * 3.6);
              if (iv.windDirection != null) {
                setWx(prev => ({ ...(prev||{}), wind_direction_10m: iv.windDirection }));
              }
              // Campos extras (teto, orvalho, UV, pressão)
              setExtra({
                cloudCeiling: iv.cloudCeiling ?? null,      // metros
                dewPoint:     iv.dewPoint ?? null,          // °C
                uvIndex:      iv.uvIndex ?? null,
                pressure:     iv.pressureSurfaceLevel ?? null, // hPa
              });
              // Previsão horária de vento 120m (próximas 12h)
              if (hourlyTl?.intervals?.length) {
                const series = hourlyTl.intervals.slice(0, 12).map(it => ({
                  time:  parseLocal(it.startTime.slice(0,16)),
                  wind:  it.values.windSpeed != null ? it.values.windSpeed * 3.6 : null,
                  gust:  it.values.windGust  != null ? it.values.windGust  * 3.6 : null,
                }));
                setWindForecast(series);
              }
              setWindSource("tomorrow");
              tomorrowOK = true;
            }
          } catch (e) {
            // Falha/limite do Tomorrow → cai para Open-Meteo silenciosamente
            console.warn("Tomorrow.io indisponível, usando Open-Meteo:", e.message);
          }
        }
        if (!tomorrowOK) {
          setWindSource("openmeteo");
          setV120Direct(null);
          setG120Direct(null);
        }

        // ── Open-Meteo (fallback + dados meteorológicos gerais) ─────────────
        const q = new URLSearchParams({
          latitude:lat, longitude:lon,
          current:"temperature_2m,wind_speed_10m,wind_direction_10m,wind_gusts_10m,cloud_cover,visibility",
          hourly:"precipitation_probability,wind_speed_80m,wind_direction_80m",
          daily:"sunrise,sunset",
          wind_speed_unit:"kmh",
          timezone:"auto",
          forecast_days:"1",
        });
        const data = await fetch(`https://api.open-meteo.com/v1/forecast?${q}`).then(r=>r.json());
        setWx(data.current);
        setGust10(data.current.wind_gusts_10m ?? null);
        setUtcOffsetSec(data.utc_offset_seconds ?? (-3*3600)); // fuso do local-alvo

        const srDate = parseLocal(data.daily.sunrise[0]);
        const ssDate = parseLocal(data.daily.sunset[0]);
        setSr(srDate); setSs(ssDate);
        const srM = toMins(srDate), ssM = toMins(ssDate);
        const pm  = Math.round((srM+ssM)/2);
        setFs(Math.max(srM, pm-120));
        setFe(Math.min(ssM, pm+120));

        const curH = new Date().getHours();
        const idx  = data.hourly.time.findIndex(t=>parseLocal(t).getHours()===curH);
        if (idx>=0) {
          setPrecip(data.hourly.precipitation_probability[idx]??0);
          setW80({ speed:data.hourly.wind_speed_80m[idx], dir:data.hourly.wind_direction_80m[idx] });
        }

        // Índice Kp — NOAA Space Weather Prediction Center
        // Formato atual (2026): array de OBJETOS {time_tag, Kp, a_running, station_count}
        // Alguns formatos antigos vinham como array de arrays — tratamos os dois.
        // Se o NOAA bloquear por CORS, tentamos um proxy público como fallback.
        const KP_URL = "https://services.swpc.noaa.gov/products/noaa-planetary-k-index.json";
        const extractKp = (raw) => {
          if (!Array.isArray(raw) || raw.length === 0) return null;
          // Varre de trás p/ frente buscando o último Kp numérico válido
          for (let i = raw.length - 1; i >= 0; i--) {
            const row = raw[i];
            let val = null;
            if (row && typeof row === "object" && !Array.isArray(row)) {
              val = parseFloat(row.Kp ?? row.kp ?? row.kp_index ?? row.estimated_kp);
            } else if (Array.isArray(row)) {
              // pula cabeçalho textual
              if (i === 0 && isNaN(parseFloat(row[1]))) continue;
              val = parseFloat(row[1]);
            }
            if (val != null && !isNaN(val)) return val;
          }
          return null;
        };
        try {
          let kpVal = null;
          try {
            const kpRaw = await fetch(KP_URL).then(r => { if(!r.ok) throw new Error("HTTP "+r.status); return r.json(); });
            kpVal = extractKp(kpRaw);
          } catch (corsErr) {
            // Fallback via proxy CORS (caso o NOAA bloqueie a origem do Netlify)
            const proxied = "https://corsproxy.io/?url=" + encodeURIComponent(KP_URL);
            const kpRaw2 = await fetch(proxied).then(r => r.json());
            kpVal = extractKp(kpRaw2);
          }
          if (kpVal != null) setKp(kpVal);
        } catch (e) {
          console.warn("Kp indisponível:", e.message);
        }

        // Previsão Kp 3 dias — NOAA (array de objetos {time_tag, kp, observed})
        const KPF_URL = "https://services.swpc.noaa.gov/products/noaa-planetary-k-index-forecast.json";
        try {
          let kpfRaw = null;
          try {
            kpfRaw = await fetch(KPF_URL).then(r => { if(!r.ok) throw new Error("HTTP "+r.status); return r.json(); });
          } catch (_) {
            const proxied = "https://corsproxy.io/?url=" + encodeURIComponent(KPF_URL);
            kpfRaw = await fetch(proxied).then(r => r.json());
          }
          if (Array.isArray(kpfRaw)) {
            const nowT = Date.now();
            // Apenas registros futuros (previsão), próximos 3 dias
            const fc = kpfRaw
              .map(o => ({
                t: new Date((o.time_tag||"").replace(" ","T")),
                kp: parseFloat(o.kp ?? o.Kp),
                observed: (o.observed||"").toLowerCase().includes("predict") || (o.observed||"").toLowerCase()==="estimated",
              }))
              .filter(o => !isNaN(o.kp) && o.t.getTime() >= nowT - 3*3600*1000)
              .slice(0, 24); // 3 dias x 8 intervalos
            if (fc.length) setKpForecast(fc);
          }
        } catch (e) {
          console.warn("Previsão Kp indisponível:", e.message);
        }

      } catch (err) {
        setError("Falha ao buscar dados: " + err.message);
      }
      setLoading(false);
    };

    fetchWeatherRef.current = fetchWeather;

    // Na primeira carga: GPS. Em recargas manuais (reloadKey>0): usa coords já setadas.
    if (reloadKey > 0) {
      fetchWeather(coords.lat, coords.lon);
      return;
    }
    if (!navigator.geolocation) {
      setLocName(DEFAULT_NAME);
      fetchWeather(DEFAULT_LAT, DEFAULT_LON);
      return;
    }
    navigator.geolocation.getCurrentPosition(
      ({coords:{latitude:lat,longitude:lon}}) => fetchWeather(lat,lon),
      () => { setLocName(DEFAULT_NAME); fetchWeather(DEFAULT_LAT, DEFAULT_LON); },
      { timeout:8000 }
    );
  }, [reloadKey]);

  // ── METAR: estação mais próxima da localização atual (auto) ─────────────────
  useEffect(() => {
    let cancel = false;
    (async () => {
      try {
        setMetar(null); setMetarErr(null);
        let m = await fetchNearestMetar(coords.lat, coords.lon);
        if (!m && METAR_ICAO_FALLBACK) m = await fetchMetarByIcao(METAR_ICAO_FALLBACK);
        if (cancel) return;
        if (m) { setMetar(m); setMetarErr(null); }
        else setMetarErr("nenhuma estação próxima com observação");
      } catch (e) {
        if (!cancel) setMetarErr((e.message||"").includes("Failed to fetch") ? "CORS/rede" : e.message);
      }
    })();
    return () => { cancel = true; };
  }, [coords.lat, coords.lon]);

  // ── Busca manual de local (cidade ou ICAO) — reposiciona tudo ───────────────
  const handlePlaceSearch = async () => {
    const q = placeQuery.trim();
    if (!q) return;
    setPlaceSearching(true); setPlaceErr(null);
    try {
      let lat, lon, name;
      // Heurística: 4 letras (A-Z) → tenta ICAO primeiro
      const looksIcao = /^[A-Za-z]{4}$/.test(q);
      if (looksIcao) {
        const m = await fetchMetarByIcao(q.toUpperCase());
        if (m && m.lat!=null) {
          lat = m.lat; lon = m.lon; name = (m.name || q.toUpperCase());
        }
      }
      // Senão (ou se ICAO falhou), geocodifica como cidade via Nominatim
      if (lat == null) {
        const geo = await fetch(
          `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=1&accept-language=pt-BR`,
          { headers: { "Accept-Language": "pt-BR" } }
        ).then(r => r.json());
        if (geo && geo.length) {
          lat = parseFloat(geo[0].lat); lon = parseFloat(geo[0].lon);
          name = geo[0].display_name.split(",").slice(0,2).join(",").trim();
        }
      }
      if (lat == null || isNaN(lat)) { setPlaceErr("Local não encontrado"); setPlaceSearching(false); return; }
      // Aplica: muda coords + nome e força recarga de TUDO (clima, sol, METAR)
      setCoords({ lat, lon });
      setLocName(name || q);
      setReloadKey(k => k + 1);
      setPlaceQuery("");
    } catch (e) {
      setPlaceErr("Erro na busca");
    }
    setPlaceSearching(false);
  };

  // ── Derivados ──────────────────────────────────────────────────────────────
  const v10   = wx?.wind_speed_10m    ?? 0;
  const v80   = w80?.speed            ?? 0;
  // Vento 120m: prioriza Tomorrow.io (medido); senão extrapola via Open-Meteo
  const v120calc = v10 && v80 ? windAtHeight(v10, v80, 120) : null;
  const g120calc = gust10 && v10 && v120calc ? gustAtHeight(gust10, v10, v120calc) : null;
  const v120  = v120Direct != null ? v120Direct : v120calc;
  const g120  = g120Direct != null ? g120Direct : g120calc;
  const prc   = precip ?? 0;
  const vis   = (wx?.visibility ?? 10000) / 1000;
  const cld   = wx?.cloud_cover ?? 0;
  const temp  = wx?.temperature_2m ?? 0;
  const wDir  = wx?.wind_direction_10m ?? 0;

  const wGrade  = gradeWindMs((v120 ?? v10) / 3.6);
  const pGrade  = gradePrecip(prc);
  const vGrade  = gradeVis(vis);
  const cGrade  = gradeCloud(cld);
  const tGrade  = temp>0&&temp<42 ? "good" : "warn";
  const kpGrade = gradeKp(kp);
  const statusKey = wx ? worstOf(wGrade, pGrade, vGrade) : "warn";
  const banner = BANNER[statusKey];
  const peakM  = sr&&ss ? Math.round((toMins(sr)+toMins(ss))/2) : null;

  const kpInfo = {
    good:"GNSS estável",
    warn:"Perturbação leve",
    bad: "GNSS instável",
  };

  // Estimativa de satélites GNSS visíveis (céu aberto) — degradada por Kp alto.
  // Em condições normais, um receptor multiconstelação (GPS+GLONASS+Galileo+BeiDou)
  // enxerga ~20-32 satélites. Tempestade geomagnética reduz o lock efetivo.
  const satEstimate = (() => {
    if (kp==null || isNaN(kp)) return null;
    const base = 26;                       // média céu aberto multiconstelação
    const penalty = Math.round(Math.max(0, kp - 3) * 2.5);
    return Math.max(6, base - penalty);
  })();
  const satGrade = satEstimate==null ? "warn" : satEstimate >= 18 ? "good" : satEstimate >= 12 ? "warn" : "bad";

  // ── Campos extras Tomorrow.io (teto, orvalho, UV, pressão) ──────────────────
  const teto    = extra?.cloudCeiling ?? null;   // metros (base das nuvens)
  const orvalho = extra?.dewPoint ?? null;        // °C
  const uv      = extra?.uvIndex ?? null;
  const pressao = extra?.pressure ?? null;        // hPa
  const spread  = (orvalho!=null && temp!=null) ? (temp - orvalho) : null; // °C — risco de névoa

  // CAVOK (Ceiling And Visibility OK) — termo aeronáutico (METAR):
  //  • visibilidade ≥ 10 km
  //  • sem nuvens abaixo de 1500 m (teto null = sem nuvens baixas) ou teto ≥ 1500 m
  //  • sem precipitação significativa
  const isCavok =
    vis >= 10 &&
    (teto == null || teto >= 1500) &&
    prc < 20 &&
    cld < 50;

  // Teto: CAVOK ok; crítico se abaixo de 120m (limite legal de voo)
  const tetoGrade = isCavok ? "good"
    : teto == null ? "good"
    : teto < 120 ? "bad"
    : teto < 300 ? "warn"
    : "good";
  const tetoSub = isCavok ? "Céu livre p/ voo"
    : teto == null ? "Sem nuvens baixas"
    : teto < 120 ? "Abaixo de 120m!"
    : teto < 300 ? "Atenção à subida"
    : "Acima do limite RPA";
  // Spread T-Td baixo (<2.5°C) → alta umidade, risco de névoa/condensação
  const spreadGrade = spread==null ? "good"
    : spread < 2.5 ? "warn"
    : "good";
  // UV: 0-5 ok, 6-7 atenção, 8+ alto (proteção do operador)
  const uvGrade = uv==null ? "good"
    : uv < 6 ? "good"
    : uv < 8 ? "warn"
    : "bad";
  const uvInfo = uv==null ? "" : uv < 3 ? "Baixo" : uv < 6 ? "Moderado" : uv < 8 ? "Alto" : uv < 11 ? "Muito alto" : "Extremo";

  return (
    <div className={"dw-shell dw-"+aba} style={{minHeight:"100vh",background:"#080F1A",color:"#E2E8F0",maxWidth: aba==="espaco" ? "100%" : 480,margin:"0 auto",paddingBottom:40,fontFamily:"Space Grotesk,system-ui,sans-serif"}}>

      <div className="dw-topo">
      {/* ── Header ── */}
      <div style={{padding:"16px 16px 12px",display:"flex",alignItems:"center",gap:12,borderBottom:"1px solid #0F2035"}}>
        <div style={{width:40,height:40,borderRadius:"50%",background:"#0D1F35",display:"flex",alignItems:"center",justifyContent:"center",fontSize:21,flexShrink:0}}>🛸</div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontWeight:700,fontSize:16,letterSpacing:"-0.02em"}}>DroneWeather</div>
          <div style={{fontSize:12,color:"#475569",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
            {loading ? "Localizando…" : locName||"Localização atual"}
          </div>
          {!loading && wx && (
            <div style={{
              display:"inline-flex", alignItems:"center", gap:4, marginTop:3,
              fontSize:9, padding:"1px 7px", borderRadius:10,
              background: windSource==="tomorrow" ? "#14532D55" : "#1E3A5F55",
              color:      windSource==="tomorrow" ? "#4ADE80"   : "#60A5FA",
            }}>
              <span style={{
                width:5, height:5, borderRadius:"50%",
                background: windSource==="tomorrow" ? "#22C55E" : "#3B82F6",
              }}/>
              {windSource==="tomorrow" ? "Tomorrow.io" : "Open-Meteo"}
            </div>
          )}
        </div>
        <div style={{textAlign:"right",flexShrink:0}}>
          <div style={{fontFamily:"JetBrains Mono",fontSize:16,fontWeight:700,color:"#60A5FA"}}>
            {now.toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"})}
          </div>
          <div style={{fontSize:11,color:"#475569"}}>
            {now.toLocaleDateString("pt-BR",{weekday:"short",day:"2-digit",month:"short"})}
          </div>
        </div>
      </div>

      {/* ── Busca de local (cidade ou ICAO) ── */}
      <div style={{padding:"10px 16px 0",display:"flex",gap:8,alignItems:"center"}}>
        <div style={{flex:1,display:"flex",alignItems:"center",gap:6,background:"#0D1F35",border:"1px solid #1A2336",borderRadius:10,padding:"8px 12px"}}>
          <span style={{fontSize:13,opacity:0.6}}>🔍</span>
          <input
            type="text"
            value={placeQuery}
            onChange={(e)=>setPlaceQuery(e.target.value)}
            onKeyDown={(e)=>{ if(e.key==="Enter") handlePlaceSearch(); }}
            placeholder="Cidade ou ICAO (ex: Inocência MS, SBDN)"
            style={{flex:1,background:"transparent",border:"none",color:"#E2E8F0",fontFamily:"Space Grotesk",fontSize:13,outline:"none",minWidth:0}}
          />
          {placeQuery && (
            <span onClick={()=>{setPlaceQuery("");setPlaceErr(null);}} style={{cursor:"pointer",color:"#475569",fontSize:14}}>✕</span>
          )}
        </div>
        <button onClick={handlePlaceSearch} disabled={placeSearching} style={{
          border:"none",borderRadius:10,background:placeSearching?"#1E3A5F":"#3B82F6",
          color:"white",fontFamily:"Space Grotesk",fontSize:12,fontWeight:600,
          padding:"9px 14px",cursor:placeSearching?"default":"pointer",whiteSpace:"nowrap"}}>
          {placeSearching ? "..." : "Ir"}
        </button>
        <button onClick={()=>{ setPlaceErr(null); setLocName("Localizando…");
          if(navigator.geolocation) navigator.geolocation.getCurrentPosition(
            ({coords:{latitude,longitude}})=>{ setCoords({lat:latitude,lon:longitude}); setLocName(""); setReloadKey(k=>k+1); },
            ()=>{ setPlaceErr("GPS negado"); }, {timeout:8000});
        }} title="Usar minha localização" style={{
          border:"1px solid #1A2336",borderRadius:10,background:"#0D1F35",
          color:"#60A5FA",fontSize:14,padding:"9px 11px",cursor:"pointer"}}>
          📍
        </button>
      </div>
      {placeErr && (
        <div style={{padding:"6px 16px 0",color:"#F87171",fontSize:11}}>⚠️ {placeErr}</div>
      )}

      {/* ── Abas de módulos ── */}
      <div style={{display:"flex",gap:6,padding:"12px 16px 4px"}}>
        {[
          {id:"meteo",  label:"Meteorologia", icon:"🌤️"},
          {id:"janela", label:"Janela de Voo", icon:"☀️"},
          {id:"espaco", label:"Espaço Aéreo", icon:"🛩️"},
          {id:"radar",  label:"Radar",        icon:"🌧️"},
        ].map(t=>(
          <button key={t.id} onClick={()=>setAba(t.id)} style={{
            flex:1, border:"none", borderRadius:10, cursor:"pointer",
            fontFamily:"Space Grotesk", fontSize:11, fontWeight:600,
            padding:"9px 4px", lineHeight:1.3,
            background: aba===t.id ? "#1E3A5F" : "#0D1F35",
            color:      aba===t.id ? "#60A5FA" : "#475569",
            border:     aba===t.id ? "1px solid #3B82F6" : "1px solid #1A2336",
            transition:"all .15s",
          }}>
            <div style={{fontSize:15}}>{t.icon}</div>{t.label}
          </button>
        ))}
      </div>
      </div>{/* fim dw-topo */}

      {/* ── Aba: Espaço Aéreo (AirspaceMap via iframe) ── */}
      {aba==="espaco" && (
        <div style={{padding:"8px 0 0"}}>
          <iframe
            ref={espacoIframeRef}
            src={`https://airspace-decea.netlify.app/?lat=${coords.lat}&lon=${coords.lon}`}
            title="Espaço Aéreo DECEA"
            style={{width:"100%",height:"calc(100vh - 180px)",minHeight:480,border:"none",display:"block"}}
            allow="geolocation"
          />
          <div style={{textAlign:"center",padding:"8px 16px",color:"#334155",fontSize:9,lineHeight:1.6}}>
            AirspaceMap · DECEA/GEOAISWEB · OurAirports · ADS-B airplanes.live
          </div>
        </div>
      )}

      {/* ── Aba: Radar (em breve) ── */}
      {aba==="radar" && (
        <div style={{padding:"8px 0 0"}}>
          <iframe
            ref={radarIframeRef}
            src={`https://radar-drone.netlify.app/?lat=${coords.lat}&lon=${coords.lon}`}
            title="Radar Meteorológico"
            style={{width:"100%",height:"calc(100vh - 180px)",minHeight:480,border:"none",display:"block"}}
            allow="geolocation"
          />
          <div style={{textAlign:"center",padding:"8px 16px",color:"#334155",fontSize:9,lineHeight:1.6}}>
            Radar de precipitação · RainViewer
          </div>
        </div>
      )}

      {/* ── Loading / Erro (gerais, independem de aba) ── */}
      {loading&&(
        <div style={{padding:"56px 20px",textAlign:"center",color:"#475569"}}>
          <div style={{fontSize:48}}>🛰️</div>
          <div style={{marginTop:12,fontSize:13}}>Obtendo dados meteorológicos…</div>
        </div>
      )}

      {/* ── Erro ── */}
      {!loading&&error&&(
        <div style={{margin:"16px 16px 0",padding:"14px 16px",background:"#450A0A",borderRadius:12,color:"#FCA5A5",borderLeft:"3px solid #EF4444",fontSize:13}}>
          ⚠️ {error}
        </div>
      )}

      {!loading&&wx&&(<>

      {aba==="meteo" && (
        <div className="meteo-stack">
          {/* Banner */}
          <div style={{margin:"12px 16px 0",background:banner.bg,borderRadius:12,padding:"14px 16px",textAlign:"center"}}>
            <div style={{fontWeight:700,fontSize:15}}>{banner.icon} {banner.text}</div>
            <div style={{fontSize:11,color:"rgba(255,255,255,.45)",marginTop:3}}>
              Agora · {now.toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"})}
            </div>
          </div>

          {/* ── Bússola + Vento ── */}
          <div style={{margin:"12px 16px 0",background:"#0D1F35",borderRadius:14,padding:"14px 16px"}}>
            <div style={{fontSize:11,color:"#475569",textTransform:"uppercase",letterSpacing:"0.1em",fontWeight:600,marginBottom:12}}>
              🧭 Direção e Velocidade do Vento
            </div>
            <div style={{display:"flex",gap:16,alignItems:"center"}}>
              <WindCompass
                windFromDeg={wDir}
                v120={v120}
                deviceHeading={deviceHead}
                hasOrientation={hasOrient}
                onRequestPerm={startOrientation}
              />
              <WindLevels
                v120={v120} gust120={g120}
                windFromDeg={wDir}
              />
            </div>

          </div>

          {/* Previsão horária de vento 120m (Tomorrow.io) */}
          {windForecast && windForecast.length > 0 && (
            <div style={{ margin:"12px 16px 0", background:"#0D1F35", borderRadius:14, padding:"14px 16px" }}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:6 }}>
                <span style={{ fontSize:11, color:"#475569", textTransform:"uppercase", letterSpacing:"0.1em", fontWeight:600 }}>
                  📈 Previsão de Vento 120m
                </span>
                <span style={{ fontSize:9, color:"#475569" }}>próximas 12h</span>
              </div>
              <WindForecastChart data={windForecast}/>
              <div style={{ display:"flex", gap:12, justifyContent:"center", marginTop:6, flexWrap:"wrap" }}>
                <div style={{ display:"flex", alignItems:"center", gap:5 }}>
                  <div style={{ width:18, height:3, borderRadius:2, background:"#64748B" }}/>
                  <span style={{ color:"#64748B", fontSize:9 }}>Constante (sólido)</span>
                </div>
                <div style={{ display:"flex", alignItems:"center", gap:5 }}>
                  <div style={{ width:18, height:3, borderRadius:2, background:"#64748B", opacity:0.6,
                    backgroundImage:"repeating-linear-gradient(90deg,#64748B 0 3px,transparent 3px 5px)" }}/>
                  <span style={{ color:"#64748B", fontSize:9 }}>Rajada (tracejado)</span>
                </div>
                <div style={{ display:"flex", alignItems:"center", gap:6 }}>
                  {[["#22C55E","≤10"],["#F97316","10-12"],["#EF4444","≥12 m/s"]].map(([c,l])=>(
                    <div key={l} style={{ display:"flex", alignItems:"center", gap:3 }}>
                      <div style={{ width:8, height:8, borderRadius:"50%", background:c }}/>
                      <span style={{ color:"#64748B", fontSize:8 }}>{l}</span>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          )}

          {/* Cards meteorológicos */}
          <div style={{margin:"12px 16px 0",display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <WxCard icon="🌧️" label="Precipitação" value={prc}              unit="%" grade={pGrade}/>
            <WxCard icon="👁️"  label="Visibilidade" value={vis.toFixed(1)}   unit="km" grade={vGrade}/>
            <WxCard icon="☁️"  label="Nuvens"        value={cld}              unit="%" grade={cGrade}/>
            <WxCard icon="🌡️" label="Temperatura"  value={Math.round(temp)} unit="°C" grade={tGrade}/>
            {/* Novos cards (Tomorrow.io) */}
            <WxCard icon="🌥️" label="Teto de Nuvens"
              value={isCavok ? "CAVOK" : (teto!=null ? Math.round(teto) : "—")}
              unit={isCavok || teto==null ? "" : "m"}
              grade={tetoGrade}
              sub={tetoSub} subLabel={isCavok ? "Aviação" : "Base"}/>
            {orvalho!=null && (
              <WxCard icon="💧" label="Ponto Orvalho" value={Math.round(orvalho)} unit="°C"
                grade={spreadGrade}
                sub={`Spread ${spread!=null?spread.toFixed(1):"—"}°C`} subLabel="Névoa"/>
            )}
            {uv!=null && (
              <WxCard icon="🔆" label="Índice UV" value={Math.round(uv)} unit=""
                grade={uvGrade}
                sub={uvInfo} subLabel="Operador"/>
            )}
            {pressao!=null && (
              <WxCard icon="🎚️" label="Pressão" value={Math.round(pressao)} unit="hPa"
                grade="good"
                sub="Calibração baro" subLabel="Nível sup."/>
            )}
          </div>

          {/* Índice Kp + Previsão 3 dias */}
          <div style={{margin:"12px 16px 0",background:"#0D1F35",borderRadius:14,padding:"14px 16px",borderLeft:`3px solid ${CL[kpGrade].color}`}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
              <div>
                <div style={{display:"flex",alignItems:"center",gap:6}}>
                  <span style={{fontSize:18}}>🌌</span>
                  <span style={{color:"#475569",fontSize:10,textTransform:"uppercase",letterSpacing:"0.07em"}}>Índice Kp</span>
                </div>
                <div style={{color:CL[kpGrade].color,fontFamily:"JetBrains Mono",fontSize:28,fontWeight:700,lineHeight:1.1,marginTop:4}}>
                  {(kp!=null && !isNaN(kp)) ? kp.toFixed(2) : "—"}
                </div>
                <div style={{color:"#475569",fontSize:10,marginTop:1}}>
                  GNSS: <span style={{color:CL[kpGrade].color}}>{(kp!=null && !isNaN(kp)) ? kpInfo[kpGrade] : "Aguardando"}</span>
                </div>
              </div>
              <span style={{fontSize:8,fontWeight:700,letterSpacing:"0.04em",background:CL[kpGrade].bg+"44",color:CL[kpGrade].color,padding:"2px 8px",borderRadius:20}}>
                {CL[kpGrade].tag}
              </span>
            </div>

            {/* Previsão Kp 3 dias */}
            {kpForecast && kpForecast.length > 0 && (
              <div style={{marginTop:12,paddingTop:12,borderTop:"1px solid #0F2035"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:2}}>
                  <span style={{color:"#475569",fontSize:9,textTransform:"uppercase",letterSpacing:"0.06em"}}>Previsão 3 dias</span>
                  <div style={{display:"flex",gap:8}}>
                    <span style={{color:"#64748B",fontSize:8}}>● obs</span>
                    <span style={{color:"#64748B",fontSize:8,opacity:0.55}}>● prev</span>
                  </div>
                </div>
                <KpForecastBars data={kpForecast}/>
              </div>
            )}
          </div>

          {/* Satélites GNSS (estimativa) */}
          <div style={{margin:"12px 16px 0",display:"grid",gridTemplateColumns:"1fr",gap:10}}>
            <WxCard icon="🛰️" label="Satélites GNSS"
              value={satEstimate!=null ? `~${satEstimate}` : "—"} unit=""
              grade={satGrade}
              sub={satEstimate!=null ? "Estimativa céu aberto (multiconstelação, degradada por Kp)" : "Aguardando Kp"}
              subLabel="Visíveis"/>
          </div>

          {/* Observação Oficial METAR */}
          {metar && (
            <div style={{margin:"12px 16px 0",background:"#0D1F35",borderRadius:14,padding:"14px 16px",borderLeft:"3px solid #0EA5E9"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                <span style={{fontSize:11,color:"#475569",textTransform:"uppercase",letterSpacing:"0.1em",fontWeight:600}}>
                  🛬 METAR Oficial · {metar.icaoId || "—"}
                </span>
                {(() => {
                  const age = metarAgeMin(metar);
                  return <span style={{fontSize:9,color:age!=null&&age<75?"#22C55E":"#F59E0B"}}>
                    {age!=null ? `há ${age} min` : "—"}{metar._distKm!=null?` · ${metar._distKm} km`:""}
                  </span>;
                })()}
              </div>

              {/* CAVOK badge */}
              {metarIsCavok(metar) && (
                <div style={{marginBottom:10,padding:"8px 12px",background:"#14532D",borderRadius:10,textAlign:"center"}}>
                  <span style={{color:"#4ADE80",fontWeight:700,fontSize:13,letterSpacing:"0.05em"}}>✅ CAVOK</span>
                  <span style={{color:"rgba(255,255,255,0.5)",fontSize:10,marginLeft:8}}>teto e visibilidade OK</span>
                </div>
              )}

              {/* Grid de campos decodificados */}
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px 12px"}}>
                {[
                  ["💨 Vento", metar.wdir!=null ? `${Math.round((metar.wspd||0)*KT_TO_KMH)} km/h ${metarWindDir(metar.wdir)}` : "calmo"],
                  ["🌡️ Temp", metar.temp!=null ? `${Math.round(metar.temp)}°C` : "—"],
                  ["💧 Orvalho", metar.dewp!=null ? `${Math.round(metar.dewp)}°C` : "—"],
                  ["🎚️ QNH", metar.altim!=null ? `${Math.round(metar.altim)} hPa` : "—"],
                  ["👁️ Visibilidade", metarVisib(metar.visib)],
                  ["☁️ Nuvens", (!metar.clouds||metar.clouds.length===0||metar.clouds[0].cover==="CLR"||metar.clouds[0].cover==="SKC") ? "Limpo" : metar.clouds.map(c=>c.cover+(c.base?` ${Math.round(c.base*0.3048)}m`:"")).join(", ")],
                ].map(([k,v]) => (
                  <div key={k} style={{display:"flex",flexDirection:"column",gap:1}}>
                    <span style={{color:"#475569",fontSize:9}}>{k}</span>
                    <span style={{color:"#CBD5E1",fontFamily:"JetBrains Mono",fontSize:12,fontWeight:600}}>{v}</span>
                  </div>
                ))}
              </div>

              {/* METAR bruto */}
              {metar.rawOb && (
                <div style={{marginTop:10,padding:"8px 10px",background:"#080F1A",borderRadius:8,
                  color:"#5BA9F5",fontFamily:"JetBrains Mono",fontSize:10,lineHeight:1.5,wordBreak:"break-word"}}>
                  {metar.rawOb}
                </div>
              )}

              <div style={{marginTop:8,color:"#334155",fontSize:9,lineHeight:1.5}}>
                {metar.name ? metar.name + ". " : ""}Observação oficial (fonte para decisão de voo). Vento a 10m · QNH ao nível do mar. A estação METAR mais próxima pode estar a alguns km do ponto de voo.
              </div>
            </div>
          )}

          {/* Painel de diagnóstico (retrátil) */}
          <details style={{margin:"16px 16px 0",background:"#0A1422",borderRadius:10,padding:"10px 14px",border:"1px solid #0F2035"}}>
            <summary style={{color:"#475569",fontSize:11,cursor:"pointer",userSelect:"none",letterSpacing:"0.05em"}}>
              🔧 Diagnóstico de dados (Tomorrow.io)
            </summary>
            <div style={{marginTop:10,display:"grid",gridTemplateColumns:"1fr 1fr",gap:"4px 12px"}}>
              {[
                ["Fonte vento", windSource],
                ["Vento 120m", v120Direct!=null ? `${(v120Direct/3.6).toFixed(1)} m/s` : "null"],
                ["Rajada 120m", g120Direct!=null ? `${(g120Direct/3.6).toFixed(1)} m/s` : "null"],
                ["Teto nuvens", teto!=null ? `${Math.round(teto)} m` : "null (sem teto)"],
                ["Ponto orvalho", orvalho!=null ? `${orvalho.toFixed(1)} °C` : "null"],
                ["Índice UV", uv!=null ? uv.toFixed(1) : "null"],
                ["Pressão", pressao!=null ? `${Math.round(pressao)} hPa` : "null"],
                ["Cobertura nuvens", `${cld}%`],
                ["Prev. horária", windForecast ? `${windForecast.length} pts` : "null"],
                ["Kp atual", (kp!=null&&!isNaN(kp)) ? kp.toFixed(2) : "null"],
                ["Prev. Kp 3d", kpForecast ? `${kpForecast.length} pts` : "null"],
                ["METAR " + (metar?.icaoId || "auto"), metar ? (metarAgeMin(metar)+" min"+(metar._distKm!=null?` (${metar._distKm}km)`:"")) : ("null — "+(metarErr||"?"))],
              ].map(([k,v]) => (
                <div key={k} style={{display:"flex",justifyContent:"space-between",gap:8}}>
                  <span style={{color:"#475569",fontSize:10}}>{k}</span>
                  <span style={{
                    color: String(v).startsWith("null") ? "#7F1D1D" : "#22C55E",
                    fontFamily:"JetBrains Mono", fontSize:10, textAlign:"right",
                  }}>{v}</span>
                </div>
              ))}
            </div>
            <div style={{marginTop:8,color:"#334155",fontSize:9,lineHeight:1.5}}>
              "null" no teto de nuvens é normal em céu limpo — a API só reporta teto quando há nuvens baixas. O card só aparece quando há valor.
            </div>
          </details>

          {/* Rodapé */}
          <div className="span-full" style={{textAlign:"center",padding:"20px 16px 8px",color:"#1E3A5F",fontSize:10,lineHeight:1.8}}>
            {windSource==="tomorrow" ? "Tomorrow.io" : "Open-Meteo"} · METAR/AWC · NOAA SWPC · v3.0<br/>
            {windSource==="tomorrow"
              ? "Vento e rajada medidos em 120m AGL"
              : "Vento 120m AGL estimado por perfil logarítmico"}
            <br/>Regulamentação ANAC RBAC-100
          </div>

        </div>
      )}

      {aba==="janela" && (
        <div className="janela-wrap">
          <div>
          {/* Trajetória Solar + Janela de Voo (unificados) */}
          <div style={{margin:"12px 16px 0",background:"#0D1F35",borderRadius:14,padding:"14px 12px 12px"}}>
            <div style={{display:"flex",justifyContent:"space-between",padding:"0 4px",marginBottom:8}}>
              <span style={{fontSize:11,color:"#475569",textTransform:"uppercase",letterSpacing:"0.1em",fontWeight:600}}>☀️ Trajetória Solar &amp; Janela de Voo</span>
              {sr&&ss&&(() => {
                const dur = toMins(ss) - toMins(sr);
                return <span style={{fontSize:11,fontFamily:"JetBrains Mono",color:"#60A5FA"}}>
                  ☀️ {Math.floor(dur/60)}h{dur%60?` ${dur%60}m`:""} de luz
                </span>;
              })()}
            </div>
            <SunArc sr={sr} ss={ss} now={now} fs={fs} fe={fe}/>
            <div style={{display:"flex",gap:14,justifyContent:"center",marginTop:8,marginBottom:14,flexWrap:"wrap"}}>
              {[["#F59E0B","Padrão ±2h"],["#3B82F6","Sua janela"],["#FCD34D","Pico solar"]].map(([c,l])=>(
                <div key={l} style={{display:"flex",alignItems:"center",gap:5}}>
                  <div style={{width:20,height:4,borderRadius:2,background:c,opacity:l==="Padrão ±2h"?0.7:1}}/>
                  <span style={{color:"#64748B",fontSize:9}}>{l}</span>
                </div>
              ))}
            </div>
            <div style={{borderTop:"1px solid #0F2035",paddingTop:14}}>
              <div style={{fontSize:11,color:"#475569",textTransform:"uppercase",letterSpacing:"0.1em",fontWeight:600,marginBottom:12}}>✈️ Janela de Voo</div>
              <FlightTimeline sr={sr} ss={ss} fs={fs} fe={fe} now={now} peakM={peakM} twilightMins={twilightMins}
                onChange={(s,e)=>{ setFs(s); setFe(e); }}
                onReset={()=>{if(sr&&ss){setFs(toMins(sr));setFe(toMins(ss));}}}/>
            </div>
          </div>

          {/* Domo Solar 3D */}
          <div style={{margin:"12px 16px 0",background:"#0D1F35",borderRadius:14,padding:"14px 16px"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
              <span style={{fontSize:11,color:"#475569",textTransform:"uppercase",letterSpacing:"0.1em",fontWeight:600}}>
                🌄 Sol 3D &amp; Sombra
              </span>
              <button onClick={()=>setSun3DMin(now.getHours()*60+now.getMinutes())} style={{
                border:"1px solid #1E3A5F",borderRadius:20,background:"transparent",color:"#60A5FA",
                fontSize:10,padding:"3px 10px",cursor:"pointer",fontFamily:"Space Grotesk"}}>
                ☀️ Agora
              </button>
            </div>
            {(() => {
              const dk = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,"0")}-${String(now.getDate()).padStart(2,"0")}`;
              const [yy,mm,dd] = dk.split("-").map(Number);
              const d3 = localMinToDate(yy, mm, dd, sun3DMin, utcOffsetSec);
              const sp3 = solarPosition(d3, coords.lat, coords.lon);
              return (
                <div style={{display:"flex",gap:14,marginBottom:8,fontSize:11,fontFamily:"JetBrains Mono"}}>
                  <span style={{color:"#94A3B8"}}>Sol às <span style={{color:"#F5A623"}}>{toHM(sun3DMin)}</span></span>
                  <span style={{color:"#475569"}}>az <span style={{color:"#94A3B8"}}>{sp3.azimuth.toFixed(0)}°</span></span>
                  <span style={{color:"#475569"}}>alt <span style={{color:"#94A3B8"}}>{sp3.altitude.toFixed(0)}°</span></span>
                </div>
              );
            })()}
            <SunDome3D
              lat={coords.lat} lon={coords.lon}
              dateKey={`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,"0")}-${String(now.getDate()).padStart(2,"0")}`}
              sunMin={sun3DMin} fs={fs} fe={fe} utcOffsetSec={utcOffsetSec}/>

            {/* Barra própria de hora do sol (controla só o 3D) */}
            <div style={{marginTop:12}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:2}}>
                <span style={{fontSize:9,color:"#475569",textTransform:"uppercase",letterSpacing:"0.1em"}}>Posição do sol</span>
                <span style={{fontFamily:"JetBrains Mono",fontSize:14,fontWeight:700,color:"#F5A623"}}>{toHM(sun3DMin)}</span>
              </div>
              <input type="range" min="0" max="1439" step="5" value={sun3DMin}
                onChange={(e)=>setSun3DMin(+e.target.value)}
                style={{width:"100%",height:30,cursor:"pointer",accentColor:"#F5A623"}}/>
              <div style={{display:"flex",justifyContent:"space-between"}}>
                {[0,6,12,18,24].map(h=>(<span key={h} style={{color:"#1E3A5F",fontSize:9,fontFamily:"JetBrains Mono"}}>{String(h).padStart(2,"0")}h</span>))}
              </div>
            </div>

            <div style={{marginTop:8,color:"#334155",fontSize:9,lineHeight:1.5}}>
              Use a barra acima para mover o sol e ver a sombra em qualquer hora. Gire com o dedo, pinça p/ zoom.
              Arco azul = janela de voo; amarelo = trajetória do dia; tracejado = trópicos e equador.
            </div>
            <div style={{display:"flex",gap:14,justifyContent:"center",marginTop:8,flexWrap:"wrap"}}>
              {[["#F5A623","Trajetória do dia"],["#3B82F6","Janela de voo"],["#FCD34D","Pico solar"],["#93A4C8","Trópicos / Equador"]].map(([c,l])=>(
                <div key={l} style={{display:"flex",alignItems:"center",gap:5}}>
                  <div style={{width:16,height:3,borderRadius:2,background:c}}/>
                  <span style={{color:"#64748B",fontSize:9}}>{l}</span>
                </div>
              ))}
            </div>
          </div>
          </div>
        </div>
      )}

      </>)}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
